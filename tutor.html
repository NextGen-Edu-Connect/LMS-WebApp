<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEC Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background:
                linear-gradient(
                    135deg,
                    #020617,
                    #0f172a,
                    #172554,
                    #1d4ed8
                );

            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* BACKGROUND */

        .bg1 {
            position: fixed;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: #2563eb;
            top: -160px;
            left: -160px;
            filter: blur(140px);
            opacity: 0.45;
        }

        .bg2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: #38bdf8;
            bottom: -220px;
            right: -180px;
            filter: blur(150px);
            opacity: 0.35;
        }

        /* LAYOUT */

        .layout {
            position: relative;
            z-index: 10;
            display: flex;
            height: 100vh;
             overflow: hidden;
        }

        /* SIDEBAR */

        .sidebar
         {
            width: 240px;
            background:  rgba(255,255,255,0.08);
            border-right:  1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
             overflow-y: auto;
             height: 100vh;
        }

        .logo
         {
            text-align: center;
             margin-bottom: 22px;
        }

        .logo-circle {
            width: 58px;
            height: 58px;
            margin: auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg,#2563eb,#60a5fa);
            box-shadow: 0 0 18px rgba(37,99,235,0.45);
            margin-bottom: 10px;
        }
       .logo h2 {
    font-size: 18px;
    font-weight: 600;
}

.logo p {
    font-size: 11px;
    color: #cbd5e1;
}

/* MENU */

.menu {
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex: 1;
}

.menu-item {
    padding: 11px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
    background:rgba(255,255,255,0.05);
    border:1px solid transparent;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
}

.menu-item:hover {
    transform: translateX(3px);
    background:
        rgba(255,255,255,0.08);
}

.menu-item.active {
    background:
        linear-gradient(
            135deg,
            rgba(37,99,235,0.35),
            rgba(96,165,250,0.10)
        );
    border:
        1px solid rgba(96,165,250,0.35);
    box-shadow:
        0 6px 18px rgba(37,99,235,0.22);
}

/* LOGOUT BUTTON */

.logout-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 14px;
    background:
        linear-gradient(
            135deg,
            #2563eb,
            #60a5fa
        );

    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
}

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 10px 24px rgba(37,99,235,0.4);
        }

        /* CONTENT */

        .content {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            height: 100vh;
        }

        .topbar {
            margin-bottom: 30px;
        }

        .topbar h1 {
            font-size: 36px;
            font-weight: 700;
        }

        .topbar p {
            color: #cbd5e1;
            margin-top: 6px;
        }

        /* PAGE */

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* CARD */

        .card {
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.10);
            border-radius: 28px;
            padding: 30px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 10px 30px rgba(0,0,0,0.25);
        }

        .card-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        /* INPUT */

        .input-group {
            margin-bottom: 18px;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background:rgba(255,255,255,0.08);
            color: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input:focus,
        textarea:focus,
        select:focus {
            background:rgba(255,255,255,0.14);
            box-shadow:0 0 14px rgba(59,130,246,0.6);
        }
        textarea {
            resize: none;
            height: 110px;
        }

        input::placeholder,textarea::placeholder {
            color: #cbd5e1;
        }

        option {
            color: black;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #60a5fa
                );

            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow:
                0 10px 24px rgba(37,99,235,0.4);
        }

        /* TABLE */

        .table-search {
            margin-bottom: 20px;
            max-width: 350px;
        }

        .table-container {
            overflow-x: auto;
            background:
                rgba(255,255,255,0.06);
            border:
                1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            backdrop-filter: blur(18px);
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            color: #93c5fd;
            border-bottom:
                1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 16px;
            border-bottom:
                1px solid rgba(255,255,255,0.06);
        }

        .action-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            margin-right: 8px;
            font-size: 13px;
        }

        .edit-btn {
            background:
                linear-gradient(
                    135deg,
                    #2563eb,
                    #3b82f6
                );
        }

        .delete-btn {
            background:
                linear-gradient(
                    135deg,
                    #dc2626,
                    #ef4444
                );
        }

        /* MODAL OVERLAY */

.modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;

    background: rgba(0,0,0,0.65);

    justify-content: center;
    align-items: flex-start;

    overflow-y: auto;
    padding: 30px 15px;
}

/* SHOW MODAL */

.modal.show {
    display: flex;
}

/* MODAL BOX */

.modal-content {

    width: 500px;
    max-width: 95%;

    background: #101828;
    border-radius: 20px;

    padding: 25px;

    position: relative;

    max-height: 90vh;
    overflow-y: auto;

    animation: popup 0.3s ease;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.4);
}

/* SCROLL */

.modal-content::-webkit-scrollbar {
    width: 6px;
}

.modal-content::-webkit-scrollbar-thumb {
    background: #3b82f6;
    border-radius: 10px;
}
       

@keyframes popup {
    from {
        transform: scale(0.8);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.modal-header h2 {
    font-size: 24px;
    font-weight: 600;
}

.close-btn {
    font-size: 24px;
    cursor: pointer;
    color: #cbd5e1;
    transition: 0.3s;
}

.close-btn:hover {
    color: #ffffff;
    transform: rotate(90deg);
}
        #adminMsg {
            margin-top: 20px;
            color: #93c5fd;
        }
    </style>
</head>


<body>
    <div class="bg1"></div>
    <div class="bg2"></div>
    <div class="layout">
        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">
                <div class="logo-circle">
                    NEC
                </div>
                <h2>Tutor Panel</h2>
                <p>
                    Learning Management System
                </p>
            </div>
            <div class="menu">
                <div class="menu-item active"
                     onclick="showPage('enrollmentPage', this)">
                    👤 Student Enrollment
                </div>
                <div class="menu-item"
                     onclick="showPage('trackStudentPage', this)">
                    📘 Tracking Student
                </div>
                 <div class="menu-item active"
                     onclick="showPage('manageEnrollment', this)">
                    👤 Manage Enrollment
                </div>
               
            </div>
            <button class="logout-btn"
                    onclick="logout()">
                Logout
            </button>

        </div>

        <!-- CONTENT -->

        <div class="content">
            <div class="topbar">
                <h1>
                    Dashboard
                </h1>
                <p>
                    Student Enrollment and Tracking
                </p>
            </div>

            <!-- CREATE USER -->

            <div class="page active" id="enrollmentPage">
                <div class="card">
                    <div class="card-title">
                        Student Enrollment
                    </div>
                    <div class="input-group">
                        <select id="mailIdDropDown"></select>
                    </div>
                    <div class="input-group">
                        <input type="text" id="studentName" placeholder="Student Name">
                    </div>
                    <div class="input-group">
                        <input type="text" id="studentRegNo" placeholder="Student RegNo">
                    </div>
                    <div class="input-group">
                        <select id="collegeDropDown"></select>
                    </div>
                   
                    <button class="btn" onclick="doEnrollment()">
                        Enrollment
                    </button>
                </div>
            </div>

            <!-- MANAGE ENROLLMENT -->
             <div class="page" id="manageEnrollment">
                <div class="table-search">
                    <input type="text" placeholder="Search Student..." onkeyup="searchTable(this, 'studentEnrollmentTable')">
                </div>
                <div class="table-container">
                    <table id="studentEnrollmentTable">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Mail ID</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentEnrollmentBody">
                       </tbody>
                    </table>
                </div>
            </div>
           
    </div>
</div>

 <!-- EDIT STUDENT ENROLLMENT MODAL -->

<div class="modal" id="editStudentEnrollmentModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Student Enrollment</h2>
            <span class="close-btn" onclick="closeStudentEnrollmentModal()">
                ✕
            </span>
        </div>
        <input type="hidden"  id="editStudentEnrollmentId">

        <div class="input-group">
           <textarea  id="editStudentMailID"
                placeholder="Mail ID" readonly></textarea>
        </div>
       
        <div class="input-group">
            <textarea  id="editStudentName"
                placeholder="Student Name"></textarea>
        </div>
        <div class="input-group">
            <textarea  id="editStudentRegNo"
                placeholder="Student RegNo"></textarea>
        </div>
        <div class="input-group">
              <select id="editCollageNameDropDown"></select>
            </div>
        <button class="btn" onclick="updateStudentEnrollment()">
            Update Enrollment
        </button>
    </div>
</div>

 
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="app.js"></script>

    

</body>

</html>
