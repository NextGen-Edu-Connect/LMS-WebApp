<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);

padding:30px;

}

.container{

width:430px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(18px);

border-radius:25px;

padding:35px;

color:white;

box-shadow:0 20px 45px rgba(0,0,0,.4);

}

.logo{

font-size:28px;

font-weight:700;

text-align:center;

margin-bottom:5px;

}

.subtitle{

text-align:center;

margin-bottom:25px;

color:#cbd5e1;

}

.form-group{

margin-bottom:18px;

}

label{

display:block;

margin-bottom:8px;

font-size:14px;

font-weight:600;

}

input{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:12px;

background:rgba(255,255,255,.12);

color:white;

font-size:15px;

}

input::placeholder{

color:#cbd5e1;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

margin-top:10px;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#otpSection{

display:none;

}

#passwordSection{

display:none;

}

#message{

margin-top:18px;

text-align:center;

font-size:14px;

font-weight:600;

}

.success{

color:#22c55e;

}

.error{

color:#ef4444;

}

.timer{

margin-top:15px;

text-align:center;

color:#fbbf24;

font-size:14px;

}

.resend{

margin-top:10px;

text-align:center;

}

.resend a{

color:#60a5fa;

cursor:pointer;

text-decoration:none;

}

.back{

display:block;

margin-top:25px;

text-align:center;

text-decoration:none;

color:#93c5fd;

}

.back:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

NextGen Edu Connect

</div>

<div class="subtitle">

Reset your account password

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter registered email">

</div>

<button onclick="sendOTP()">

Send OTP

</button>

<div id="otpSection">

<div class="form-group" style="margin-top:20px;">

<label>OTP</label>

<input
type="text"
id="otp"
placeholder="Enter 6 digit OTP">

</div>

<button onclick="verifyOTP()">

Verify OTP

</button>

<div class="timer" id="timer"></div>

<div class="resend">

<a onclick="sendOTP()">

Resend OTP

</a>

</div>

</div>

<div id="passwordSection">

<div class="form-group" style="margin-top:20px;">

<label>New Password</label>

<input
type="password"
id="newPassword"
placeholder="Enter new password">

</div>

<div class="form-group">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
placeholder="Confirm password">

</div>

<button onclick="resetPassword()">

Reset Password

</button>

</div>

<div id="message"></div>

<a href="login.html" class="back">

← Back to Login

</a>

</div>

<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

let generatedOTP="";
let otpExpireTime=null;
let countdownInterval=null;

function showMessage(msg,type="success")
{
    const m=document.getElementById("message");
    m.className=type;
    m.innerHTML=msg;
}

function startTimer()
{
    clearInterval(countdownInterval);
    let seconds=300;
    const timer=document.getElementById("timer");
    countdownInterval=setInterval(()=>
    {
        const min=Math.floor(seconds/60);
        const sec=seconds%60;
        timer.innerHTML="OTP expires in "+min+":"+(sec<10?"0":"")+sec;
        seconds--;

        if(seconds<0)
        {
            clearInterval(countdownInterval);
            generatedOTP="";
            otpExpireTime=null;
            timer.innerHTML="OTP Expired";
        }

    },1000);
}

async function sendOTP()
{
    const email=document.getElementById("email").value.trim();
    if(email=="")
    {
        showMessage("Enter Email Address","error");
        return;
    }

    // Check email exists
    const {data:user,error}=await client .from("login").select("*").eq("mail_id",email).single();
    if(error || !user)
    {
        showMessage("Email not registered.","error");
        return;
    }

    generatedOTP=Math.floor(100000+Math.random()*900000).toString();
    otpExpireTime=new Date().getTime()+5*60*1000;
    const {data,error:error1}=await client.functions.invoke(
    "send-otp-email",
    {
        body:
        {
            email:"me.nextgenlearners@gmail.com",
            otp:generatedOTP,
            studentName:user.user_name
        }
    });

    if(error1)
    {
        console.log(error1);
        showMessage("Unable to send OTP.","error");
        return;
    }
    localStorage.setItem("StudentName", user.user_name);

    document.getElementById("otpSection").style.display="block";
    startTimer();
    showMessage("OTP sent successfully.","success");
}

async function verifyOTP()
{
    const otp=document.getElementById("otp").value.trim();
    if(otp=="")
    {
        showMessage("Enter OTP.","error");
        return;
    }
    if(new Date().getTime()>otpExpireTime)
    {
        showMessage("OTP Expired.","error");
        return;
    }

    if(otp!==generatedOTP)
    {
        showMessage("Invalid OTP.","error");
        return;
    }

    clearInterval(countdownInterval);
    document.getElementById("passwordSection").style.display="block";
    showMessage("OTP Verified Successfully.","success");
}

async function resetPassword()
{
    const email = document.getElementById("email").value.trim();
    const newPassword = document.getElementById("newPassword").value.trim();
    const confirmPassword = document.getElementById("confirmPassword").value.trim();
    if(newPassword=="")
    {
        showMessage("Enter New Password.","error");
        return;
    }
    if(confirmPassword=="")
    {
        showMessage("Enter Confirm Password.","error");
        return;
    }
    if(newPassword.length<6)
    {
        showMessage("Password must be at least 6 characters.","error");
        return;
    }
    if(newPassword!=confirmPassword)
    {
        showMessage("Passwords do not match.","error");
        return;
    }
    const { error } = await client.from("login").update({ password:newPassword }).eq("mail_id",email);

    if(error)
    {
        console.log(error);
        showMessage("Unable to reset password.","error");
        return;
    }
    const student_name=localStorage.getItem("StudentName");
    const username=localStorage.getItem("user");

    const { dataReset, error:errorTest} = await client.functions.invoke("send-password-reset-success",
        {
            body: {
                studentName: student_name,
                email: "me.nextgenlearners@gmail.com",
                username: username,
                password: newPassword
                }
        }
    );

    console.log("Data:", dataReset);
        console.log("Error:", errorTest);

    showMessage("Password Reset Successfully.","success");
    setTimeout(function()
    {
        window.location.href="login.html";
    },2000);
}

</script>
