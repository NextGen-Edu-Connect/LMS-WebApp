<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: transparent;
      color: white;
      padding: 30px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .page-heading h1 {
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .page-heading p {
      color: #cbd5e1;
      font-size: 14px;
    }

    .student-pill {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      padding: 14px 18px;
      backdrop-filter: blur(18px);
      min-width: 240px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
    }

    .student-pill .label {
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 4px;
    }

    .student-pill .value {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }

    .section-title {
      font-size: 28px;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 35px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .stat-card h2 {
      font-size: 32px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .stat-card p {
      color: #dbeafe;
      font-size: 14px;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 24px;
      align-items: start;
      margin-bottom: 34px;
    }

    .left-panel,
    .right-panel {
      min-width: 0;
    }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 18px;
    }

    .course-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      backdrop-filter: blur(18px);
      transition: 0.3s ease;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.18);
    }

    .course-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
    }

    .course-top {
      padding: 20px;
      font-size: 20px;
      font-weight: 600;
      min-height: 88px;
      display: flex;
      align-items: center;
    }

    .purple {
      background: #9333ea;
    }

    .orange {
      background: #fb923c;
    }

    .green {
      background: #14b8a6;
    }

    .pink {
      background: #ec4899;
    }

    .course-body {
      padding: 20px;
    }

    .course-body p {
      font-size: 14px;
      color: #dbeafe;
      margin-bottom: 15px;
      min-height: 44px;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      background: #22c1ee;
      border-radius: 20px;
      transition: width 0.35s ease;
    }

    .course-body span {
      display: block;
      margin-top: 10px;
      font-size: 13px;
      color: #ffffff;
    }

    .summary-card {
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      color: #0f172a;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 25px;
      border-bottom: 1px solid #e5e7eb;
      gap: 12px;
    }

    .card-header h2 {
      font-size: 22px;
      font-weight: 600;
      color: #0f172a;
    }

    .summary-note {
      font-size: 13px;
      color: #64748b;
    }

    .card-body {
      padding: 25px;
    }

    .progress-item {
      margin-bottom: 28px;
    }

    .progress-item:last-child {
      margin-bottom: 0;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .percent {
      font-size: 16px;
      color: #0f172a;
      font-weight: 700;
    }

    .summary-progress-bar {
      width: 100%;
      height: 14px;
      background: #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      border-radius: 20px;
      transition: width 0.35s ease;
    }

    .blue {
      background: #0d5bd7;
    }

    .green-fill {
      background: #14b8a6;
    }

    .orange-fill {
      background: #f7931e;
    }

    .red {
      background: #ff5b2e;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      color: #334155;
    }

    .status {
      font-weight: 600;
    }

    .users {
      color: #64748b;
    }

    .message-card {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 22px;
      color: #e2e8f0;
      backdrop-filter: blur(18px);
      margin-top: 10px;
    }

    .message-card.error {
      background: rgba(239, 68, 68, 0.18);
      color: #ffe4e6;
    }

    .message-card.empty {
      background: rgba(255, 255, 255, 0.06);
      color: #dbeafe;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 992px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
      }

      .page-heading h1 {
        font-size: 24px;
      }

      .section-title {
        font-size: 22px;
      }

      .stat-card h2 {
        font-size: 26px;
      }

      .card-header,
      .card-body,
      .course-body,
      .course-top,
      .stat-card {
        padding: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="page-heading">
      <h1>Student Dashboard</h1>
      <p id="welcomeText">Loading your dashboard...</p>
    </div>

    <div class="student-pill">
      <div class="label">Logged in as</div>
      <div class="value" id="loggedInUser">--</div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <h2 id="activeCoursesCount">0</h2>
      <p>Active Courses</p>
    </div>

    <div class="stat-card">
      <h2 id="averageProgressValue">0%</h2>
      <p>Average Progress</p>
    </div>

    <div class="stat-card">
      <h2 id="certificatesCount">0</h2>
      <p>Certificates Earned</p>
    </div>

    <div class="stat-card">
      <h2 id="modulesCompletedValue">0</h2>
      <p>Modules Completed</p>
    </div>
  </div>

  <div id="errorBox" class="message-card error hidden"></div>

  <div class="dashboard-grid">
    <div class="left-panel">
      <div class="section-title">My Courses</div>
      <div id="coursesGrid" class="courses-grid"></div>
      <div id="emptyCourses" class="message-card empty hidden">
        No enrolled courses found for this student.
      </div>
    </div>

    <div class="right-panel">
      <div class="summary-card">
        <div class="card-header">
          <h2>Course Completion</h2>
          <div class="summary-note" id="summaryNote">Live DB summary</div>
        </div>

        <div class="card-body" id="summaryBody">
          <!-- Dynamic summary rows -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://akodraeqesulsofaanna.supabase.co";
    const SUPABASE_KEY = "sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const courseColorClasses = ["purple", "orange", "green", "pink"];

    document.addEventListener("DOMContentLoaded", initDashboard);

    async function initDashboard() 
    {
      try {
        const loginUser = (localStorage.getItem("user") || "").trim();
        document.getElementById("loggedInUser").textContent = loginUser || "No user";

        if (!loginUser) 
        {
          showError("No logged-in student found. Please login again from login.html.");
          setWelcome("Student login not found.");
          return;
        }

        const studentProfile = await fetchStudentProfile(loginUser);

        if (!studentProfile)
         {
          showError("Student profile not found for the logged-in user. Make sure login.username matches studentprofile.mail_id.");
          setWelcome("Profile not found.");
          return;
        }

        const regNo = studentProfile.reg_no || "";
        const studentName = studentProfile.student_name || "Student";
        const mailId = studentProfile.mail_id || loginUser;

        setWelcome(`Welcome ${studentName}`);
        document.getElementById("loggedInUser").textContent = mailId;

        const [enrollments, trackingRows, courseRows] = await Promise.all([
          fetchStudentEnrollments(regNo, studentName),
          fetchStudentTracking(regNo, studentName),
          fetchCourses()
        ]);

        const dashboardData = buildDashboardData(studentProfile, enrollments, trackingRows, courseRows);

        renderStats(dashboardData);
        renderCourses(dashboardData.courses);
        renderSummary(dashboardData.summary);
      } catch (error) {
        // Log to console only in development; never throws unhandled rejection
        if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
          console.error("Dashboard error:", error);
        }
        showError(error.message || "Failed to load dashboard.");
      }
    }

    function setWelcome(message) {
      document.getElementById("welcomeText").textContent = message;
    }

    function showError(message) {
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent = message;
      errorBox.classList.remove("hidden");
    }

    async function fetchStudentProfile(loginUser) {
  let { data, error } = await client
    .from("studentprofile")
    .select("*")
    .eq("mail_id", loginUser)
    .maybeSingle();

  if (error) {
    throw new Error("Failed to fetch student profile: " + error.message);
  }

  if (data) return data;

  let fallback = await client
    .from("studentprofile")
    .select("*")
    .eq("reg_no", loginUser)
    .maybeSingle();

  if (fallback.error) {
    throw new Error("Failed to fetch student profile by reg_no: " + fallback.error.message);
  }

  if (fallback.data) return fallback.data;

  let byName = await client
    .from("studentprofile")
    .select("*")
    .eq("student_name", loginUser)
    .maybeSingle();

  if (byName.error) {
    throw new Error("Failed to fetch student profile by student_name: " + byName.error.message);
  }

  return byName.data || null;
}

    async function fetchStudentEnrollments(regNo, studentName) 
    {
      let query = client.from("studentenrollment").select("*");

      if (regNo) {
        query = query.eq("reg_no", regNo);
      } else if (studentName) {
        query = query.eq("student_name", studentName);
      }

      const { data, error } = await query;
      if (error) throw new Error("Failed to fetch enrollment data: " + error.message);
      return data || [];
    }

    async function fetchStudentTracking(regNo, studentName) 
    {
      let query = client.from("studentcoursetracking").select("*");

      if (regNo) 
      {
        query = query.eq("reg_no", regNo);
      } 
      else if (studentName) 
      {
        query = query.eq("student_name", studentName);
      }

      const { data, error } = await query;
      if (error) throw new Error("Failed to fetch course tracking data: " + error.message);
      return data || [];
    }

    async function fetchCourses() 
    {
      const { data, error } = await client.from("courses").select("*");
      if (error) throw new Error("Failed to fetch courses: " + error.message);
      return data || [];
    }

    function buildDashboardData(profile, enrollments, trackingRows, courseRows)
     {
      const coursesByName = new Map();
      courseRows.forEach(course => {
        const key = normalizeKey(course.course_name);
        if (key) coursesByName.set(key, course);
      });

      const groupedTracking = groupBy(trackingRows, row => normalizeKey(row.course_name));

      const courseCards = enrollments.map((enrollment, index) => {
        const courseName = enrollment.course_name || "Untitled Course";
        const normalizedCourseName = normalizeKey(courseName);
        const courseInfo = coursesByName.get(normalizedCourseName) || {};
        const trackingForCourse = groupedTracking.get(normalizedCourseName) || [];

        const metrics = calculateCourseMetrics(trackingForCourse, enrollment);

        return {
          courseName,
          description: courseInfo.description || "No course description available.",
          thumbnail: courseInfo.thumbnail || "",
          progress: metrics.progress,
          completedModules: metrics.completedModules,
          totalModules: metrics.totalModules,
          courseCompleted: toBool(enrollment.course_completed),
          certificateIssued: toBool(enrollment.cerificate_issued),
          overallResult: enrollment.overall_result || "N/A",
          markObtained: enrollment.mark_obtained || "N/A",
          colorClass: courseColorClasses[index % courseColorClasses.length]
        };
      });

      const activeCoursesCount = enrollments.filter(item => {
        const activeStatus = normalizeKey(item.student_status) !== "inactive";
        return activeStatus && !toBool(item.course_completed);
      }).length;
      const certificatesCount_module=trackingRows.filter(item =>toBool(item.module_certificate_issued)).length;
      const certificatesCount = certificatesCount_module+enrollments.filter(item => toBool(item.cerificate_issued)).length;
      

      const allProgressValues = courseCards.map(item => item.progress);
      const averageProgress = allProgressValues.length
        ? Math.round(allProgressValues.reduce((sum, val) => sum + val, 0) / allProgressValues.length)
        : 0;

      const totalCompletedModules = courseCards.reduce((sum, item) => sum + item.completedModules, 0);

      const summary = buildSummary(enrollments, courseCards);

      return {
        profile,
        courses: courseCards,
        stats: {
          activeCoursesCount,
          averageProgress,
          certificatesCount,
          totalCompletedModules
        },
        summary
      };
    }

    function calculateCourseMetrics(trackingRows, enrollment) {
      const totalModules = trackingRows.length;

      // Only use columns that actually exist in studentcoursetracking schema:
      // video_completed, quiz_completed, module_certificate_issued
      const completedModules = trackingRows.filter(row => {
        const videoCompleted = toBool(row.video_completed);
        const quizCompleted  = toBool(row.quiz_completed);
        const certified      = toBool(row.module_certificate_issued);
        // A module counts as done when video is watched and quiz is passed, or cert issued
        return (videoCompleted && quizCompleted) || certified;
      }).length;

      let progress = 0;

      if (totalModules > 0) {
        progress = Math.round((completedModules / totalModules) * 100);
      } 
      else if (toBool(enrollment?.course_completed)) {
        progress = 100;
      }

      return {
        totalModules,
        completedModules,
        progress
      };
    }

    function buildSummary(enrollments, courseCards) {
      const total = enrollments.length || 0;
      const completed = enrollments.filter(x => toBool(x.course_completed)).length;
      const inProgress = enrollments.filter(x => !toBool(x.course_completed) && normalizeKey(x.student_status) !== "inactive").length;
      const inactive = enrollments.filter(x => normalizeKey(x.student_status) === "inactive").length;
      const certified = enrollments.filter(x => toBool(x.cerificate_issued)).length;

      return [
        {
          label: "In Progress",
          count: inProgress,
          percent: total ? Math.round((inProgress / total) * 100) : 0,
          className: "blue"
        },
        {
          label: "Completed",
          count: completed,
          percent: total ? Math.round((completed / total) * 100) : 0,
          className: "green-fill"
        },
        {
          label: "Inactive",
          count: inactive,
          percent: total ? Math.round((inactive / total) * 100) : 0,
          className: "orange-fill"
        },
        {
          label: "Certificates",
          count: certified,
          percent: total ? Math.round((certified / total) * 100) : 0,
          className: "red"
        }
      ];
    }

    function renderStats(data) {
      document.getElementById("activeCoursesCount").textContent = data.stats.activeCoursesCount;
      document.getElementById("averageProgressValue").textContent = data.stats.averageProgress + "%";
      document.getElementById("certificatesCount").textContent = data.stats.certificatesCount;
      document.getElementById("modulesCompletedValue").textContent = data.stats.totalCompletedModules;
    }

    function renderCourses(courses) {
      const grid = document.getElementById("coursesGrid");
      const emptyBox = document.getElementById("emptyCourses");

      grid.innerHTML = "";

      if (!courses.length) {
        emptyBox.classList.remove("hidden");
        return;
      }

      emptyBox.classList.add("hidden");

      courses.forEach((course, index) => {
        const card = document.createElement("div");
        card.className = "course-card";

        card.innerHTML = `
          <div class="course-top ${course.colorClass}">
            ${escapeHtml(course.courseName)}
          </div>
          <div class="course-body">
            <p>${escapeHtml(course.description)}</p>
            <div class="progress-bar">
              <div class="progress" style="width: ${course.progress}%"></div>
            </div>
            <span>${course.progress}% Completed • ${course.completedModules}/${course.totalModules || 0} Modules</span>
          </div>
        `;

        card.addEventListener("click", function () {
          openCourse(course.courseName, index);
        });

        grid.appendChild(card);
      });
    }

    function renderSummary(summaryItems) {
      const summaryBody = document.getElementById("summaryBody");
      summaryBody.innerHTML = "";

      summaryItems.forEach(item => {
        const row = document.createElement("div");
        row.className = "progress-item";
        row.innerHTML = `
          <div class="progress-top">
            <div class="percent">${item.percent}%</div>
          </div>
          <div class="summary-progress-bar">
            <div class="progress-fill ${item.className}" style="width: ${item.percent}%"></div>
          </div>
          <div class="progress-label">
            <div class="status">${escapeHtml(item.label)}</div>
            <div class="users">${item.count} Course${item.count === 1 ? "" : "s"}</div>
          </div>
        `;
        summaryBody.appendChild(row);
      });
    }

    function openCourse(courseName, index) {
      try {
        localStorage.setItem("selectedCourseName", courseName);
      } catch (e) {
        console.warn("Could not save selectedCourseName", e);
      }

      const frame = window.parent?.document?.getElementById("contentFrame");
      const targetUrl = `coursePage.html?course_name=${encodeURIComponent(courseName)}`;

      if (frame) {
        frame.src = targetUrl;
      } else {
        window.location.href = targetUrl;
      }
    }

    function groupBy(arr, keyFn) {
      const map = new Map();
      arr.forEach(item => {
        const key = keyFn(item);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      });
      return map;
    }

    function normalizeKey(value) {
      return String(value || "").trim().toLowerCase();
    }

    function toBool(value) {
      return value === true || value === "true" || value === "TRUE" || value === 1 || value === "1";
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
