<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

      <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:transparent;
    color:white;
    padding:30px;
}



/* STATS */

.stats-grid{
    display:grid;
    grid-template-columns:
        repeat(
            auto-fit,
            minmax(220px,1fr)
        );
    gap:20px;
    margin-bottom:35px;
}

.stat-card{
    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:24px;

    padding:25px;

    box-shadow:
        0 10px 25px rgba(0,0,0,0.25);
}

.stat-card h2{
    font-size:32px;
    margin-bottom:10px;
}

.stat-card p{
    color:#dbeafe;
}

/* RECENT */

.section-title{
    font-size:28px;
    margin-bottom:18px;
    font-weight:600;
}

.activity-card{
    background:
        rgba(255,255,255,0.08);

    border-radius:24px;

    padding:25px;

    backdrop-filter:blur(18px);
}

.activity-item{
    padding:16px 0;
    border-bottom:
        1px solid rgba(255,255,255,0.08);
}

.activity-item:last-child{
    border:none;
}

.activity-title{
    font-size:16px;
    margin-bottom:4px;
}

.activity-sub{
    color:#cbd5e1;
    font-size:14px;
}


.section-title{
    font-size:30px;
    margin-bottom:25px;
    font-weight:600;
}

/* GRID */

.courses-grid{
    display:grid;
    grid-template-columns:
        repeat(
            auto-fit,
            minmax(240px,1fr)
        );
    gap:18px;
    margin-bottom:40px;
}

/* CARD */

.course-card{
    background:
        rgba(255,255,255,0.08);

    border-radius:24px;
    overflow:hidden;
    cursor:pointer;

    backdrop-filter:blur(18px);

    transition:0.3s;
}

.course-card:hover{
    transform:
        translateY(-8px);

    box-shadow:
        0 10px 24px rgba(0,0,0,0.35);
}

.course-top{
    padding:20px;
    font-size:22px;
    font-weight:600;
}

/* COLORS */

.purple{
    background:#9333ea;
}

.orange{
    background:#fb923c;
}

.green{
    background:#14b8a6;
}

.pink{
    background:#ec4899;
}

.course-body{
    padding:20px;
}

.course-body p{
    font-size:14px;
    color:#dbeafe;
    margin-bottom:15px;
}

/* PROGRESS */

.progress-bar{
    width:100%;
    height:10px;
    background:
        rgba(255,255,255,0.12);

    border-radius:20px;
    overflow:hidden;
}

.progress{
    height:100%;
    background:#22c1ee;
    border-radius:20px;
}

.course-body span{
    display:block;
    margin-top:10px;
    font-size:13px;
}

/* CARD */

.card{
    width:400px;
    background:white;
    border-radius:18px;
    overflow:hidden;
    box-shadow:
        0 8px 25px rgba(0,0,0,0.08);
}

/* HEADER */

.card-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px;
    border-bottom:
        1px solid #e5e7eb;
}

.card-header h2{
    font-size:22px;
    font-weight:600;
    color:#0f172a;
}

.view-btn{
    border:none;
    background:#e8f0ff;
    color:#2563eb;
    padding:8px 16px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
}

/* BODY */

.card-body{
    padding:25px;
}

/* ITEM */

.progress-item{
    margin-bottom:35px;
}

.progress-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

/* BAR */

.progress-bar{
    width:100%;
    height:14px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:10px;
}

.progress-fill{
    height:100%;
    border-radius:20px;
}

/* COLORS */

.blue{
    background:#0d5bd7;
}

.green{
    background:#14b8a6;
}

.orange{
    background:#f7931e;
}

.red{
    background:#ff5b2e;
}

/* LABELS */

.progress-label{
    display:flex;
    justify-content:space-between;
    font-size:15px;
}

.status{
    color:#0d5bd7;
    font-weight:500;
}

.users{
    color:#9ca3af;
}

.percent{
    font-size:16px;
    color:#0f172a;
    font-weight:500;
}


</style>
</head>
<body>
 

<div class="section-title">
    My Courses
</div>

<div id="coursesGrid" class="courses-grid">
</div>

<!-- STATS -->

<div class="stats-grid">
    <div class="stat-card">
        <h2>
           4
        </h2>
        <p>
            Active Courses
        </p>
    </div>
    <div class="stat-card">
        <h2>
            0%
        </h2>
        <p>
            Average Progress
        </p>

    </div>

    <div class="stat-card">
        <h2>
            0
        </h2>
        <p>
            Certificates Earned
        </p>
    </div>

</div>

<div class="card">
    <!-- HEADER -->
    <div class="card-header">
        <h2>
            Course completion
        </h2>

        <!-- <button class="view-btn">
            View All
        </button> -->

    </div>

    <!-- BODY -->

    <div class="card-body">
        <!-- In Progress -->
        <div class="progress-item">
            <div class="progress-top">
                <div class="percent">
                    40%
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill pink"
                     style="width:40%">
                </div>
            </div>
            <div class="progress-label">
                <div class="status">
                    In Progress
                </div>
                <div class="users">
                    117 User
                </div>
            </div>

        </div>

        <!-- Completed -->

        <div class="progress-item">
            <div class="progress-top">
                <div class="percent">
                    20%
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill purple"
                     style="width:20%">
                </div>
            </div>
            <div class="progress-label">
                <div class="status">
                    Completed
                </div>
                <div class="users">
                    74 User
                </div>
            </div>
        </div>
        <!-- Inactive -->

        <div class="progress-item">
            <div class="progress-top">
                <div class="percent">
                    18%
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill orange"
                     style="width:18%">
                </div>
            </div>

            <div class="progress-label">
                <div class="status">
                    Inactive
                </div>
                <div class="users">
                    58 User
                </div>
            </div>
        </div>

        <!-- Expired -->

        <div class="progress-item" style="margin-bottom:0">
            <div class="progress-top">
                <div class="percent">
                    07%
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill green" style="width:7%">
                </div>
            </div>

            <div class="progress-label">
                <div class="status">
                    Expired
                </div>
                <div class="users">
                    11 User
                </div>
            </div>
        </div>
    </div>
</div>
<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );


async function loadCourses()
{
    const {data,error} = await client.from("courses")
        .select("*");

    if(error)
    {
        console.log(
            error
        );
        return;
    }

    const grid =
    document.getElementById(
        "coursesGrid"
    );

    grid.innerHTML = "";

    data.forEach(
        (course,index)=>
    {
        let topClass="";

        if(index%4===1)
        {
            topClass="purple";
        }
        else if(index%4===2)
        {
            topClass="orange";
        }
        else if(index%4===3)
        {
            topClass="green";
        }
        else
        {
            topClass="pink";
        }

        const card =
        document.createElement(
            "div"
        );

        card.className =
        "course-card";

        card.innerHTML = `

            <div class="course-top ${topClass}">
                ${course.title}
            </div>

            <div class="course-body">

                <p>
                    ${course.description}
                </p>

                <div class="progress-bar">

                    <div class="progress"
                         style="width:${course.progress || 0}%">
                    </div>

                </div>

                <span>
                    ${course.progress || 0}% Completed
                </span>

            </div>

        `;

        card.addEventListener(
            "click",
            function()
            {
                openCourse(
                    course.id
                );
            }
        );

        grid.appendChild(
            card
        );
    });
}

function openCourse(id)
{
    console.log(
        "Opening course",
        id
    );

    const frame =
    window.parent
        .document
        .getElementById(
            "contentFrame"
        );

    frame.src =
    "coursePage.html?id=" + id;
}

loadCourses();

</script>

</body>
</html>
