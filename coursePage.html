<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Details</title>

<link rel="preconnect"  href="https://fonts.googleapis.com">
<link rel="preconnect"  href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    padding:30px;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #172554,
        #1d4ed8
    );

    color:white;
}

/* BACK */

.back-btn{
    background:
        rgba(255,255,255,0.08);

    padding:12px 20px;
    border-radius:16px;
    display:inline-block;
    cursor:pointer;
    margin-bottom:25px;
    transition:0.3s;
}

.back-btn:hover{
    background:
        rgba(255,255,255,0.15);
}

/* BANNER */

.course-banner{
    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:34px;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:space-between;

    min-height:340px;

    padding:35px;
}

.banner-img{
    width:55%;
    height:300px;
    object-fit:cover;
    border-radius:28px;
    display:block;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.35);
}

.banner-content{
    width:40%;
    padding-left:35px;
}

.banner-content h1{
    font-size:42px;
    margin-bottom:10px;
}

.banner-content p{
    color:#dbeafe;
    line-height:1.8;
}

/* PROGRESS */

.progress-box{
    margin-top:25px;
}

.progress-bar{
    width:100%;
    height:12px;

    background:
        rgba(255,255,255,0.12);

    border-radius:30px;
    overflow:hidden;
}

.progress{
    height:100%;
    background:
        linear-gradient(
            90deg,
            #06b6d4,
            #3b82f6
        );
}

/* MODULES */

.section-title{
    font-size:28px;
    margin-bottom:25px;
}

.modules-grid{
    display:grid;
    grid-template-columns:
        repeat(
            auto-fit,
            minmax(300px,1fr)
        );
    gap:22px;
}

.module-card{

    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:28px;

    padding:25px;

    cursor:pointer;

    transition:0.35s;
}

.module-card:hover{
    transform:
        translateY(-8px);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.3);
}

.module-card h3{
    margin-bottom:10px;
}

.module-card p{
    color:#dbeafe;
}

.locked{
    opacity:0.45;
    cursor:not-allowed;
}

.completed{
    border:
        2px solid #22c55e;
}

.action-bar
{
    display:flex;
    justify-content:flex-end;
    margin-bottom:25px;
}

.start-course-btn
{
    border:none;
    padding:14px 28px;
    border-radius:18px;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #3b82f6
        );

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
        0 8px 25px rgba(59,130,246,0.35);
}

.start-course-btn:hover
{
    transform:translateY(-3px);

    box-shadow:
        0 12px 30px rgba(59,130,246,0.45);
}

.start-course-btn.disabled
{
    background:
        rgba(255,255,255,0.15);

    cursor:not-allowed;

    box-shadow:none;

    opacity:0.7;
}

</style>
</head>
<body>
<div class="back-btn"
     onclick="location.href='studentdashboardPage.html'">
    ← Back
</div>
<div class="action-bar">
    <button id="startCourseBtn"
            class="start-course-btn"
            onclick="StartCourse()">
        🚀 Start Course
    </button>
</div>
<div id="courseBanner" class="course-banner">
</div>
<h2 class="section-title">
    Course Modules
</h2>

<div id="modulesGrid" class="modules-grid">
</div>
<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

const params = new URLSearchParams(window.location.search);
const courseName = params.get("course_name");
let courseId=null;
let modules = [];
let activeModuleName = "";
const studentRegno = localStorage.getItem("user" );
console.log("Course Name:", courseName);

async function loadCourse()
{
    /* COURSE */

    const { data:course} = await client.from("courses").select("*").eq("course_name", courseName).single();
    courseId = course.id;

    /* MODULES */

    const { data} =await client.from("videos")
    .select("*")
    .eq("course_id", courseId)
    .order("module_name", { ascending: true });
    modules = data || [];

    /* STUDENT TRACKING */
    ViewStartButton(studentRegno,courseName);
   // const studentRegno = localStorage.getItem("studentRegno" );  
    const {data:tracking}= await client.from("studentcoursetracking").select("*").eq("reg_no",studentRegno).eq("course_name",course.course_name);

    /* MAP */

    const completedMap = {};

    tracking.forEach(t =>
    {
        const videoCompleted = !!t.video_completed;
        const quizAvailable = !!t.quiz_availble;
        const assignmentAvailable = !!t.assignment_availble;
        const quizCompleted = !!t.quiz_completed;
        const assignmentValidated = !!t.assignment_validated;

        let completed = false;

        // Video is mandatory
        if (!videoCompleted)
        {
            completed = false;
        }
        // Video + Quiz + Assignment
        else if (quizAvailable && assignmentAvailable)
        {
            completed = quizCompleted && assignmentValidated;
        }
        // Video + Quiz
        else if (quizAvailable)
        {
            completed = quizCompleted;
        }
        // Video + Assignment
        else if (assignmentAvailable)
        {
            completed = assignmentValidated;
        }
        // Video only (fallback)
        else
        {
            completed = true;
        }

        if (completed)
        {
            completedMap[t.module_name] = true;
        }
    });

    /* PROGRESS */

    let completedCount = 0;

    modules.forEach(
        m =>
    {
        if(completedMap[m.module_name])
        {
            completedCount++;
        }
    });

    const percent = Math.round((completedCount /modules.length) * 100);

    /* BANNER */

    document.getElementById("courseBanner").innerHTML =

    `
    <img src="${course.thumbnail}"
         class="banner-img">
    <div class="banner-content">
        <h1>
            ${course.course_name}
        </h1>

        <p>
            ${course.description}
        </p>
        <div class="progress-box">

            <div class="progress-bar">

                <div class="progress"
                     style="
                     width:${percent}%">
                </div>

            </div>

            <div style="margin-top:10px">
                ${percent}% Completed
            </div>

        </div>

    </div>

    `;

    /* MODULES */

    let html = "";

    modules.forEach((m,index)=>
    {
       const moduleTracking = tracking.find(t => t.module_name === m.module_name );

        const moduleResult = moduleTracking?.module_result || "";
        const completed = moduleResult === "PASS";
        const disabled =    moduleResult === "PASS" ||  moduleResult === "FAIL";
        let locked = true;
        const courseStarted =   tracking &&  tracking.length > 0;
        if (!courseStarted)
        {
            locked = true;
        }
        else if (disabled)
        {
            locked = true;
        }
        else if (index === 0)
        {
            locked = false;
        }
        else
        {
            const prev = modules[index - 1];
            locked =!completedMap[prev.module_name];
        }
        if (!locked && !disabled)
        {
            activeModuleName = m.module_name;
        }

        html += `
        <div class="module-card
             ${locked?"locked":""}
             ${completed?"completed":""}"
             onclick="${(locked || disabled)? '': "openModule('" + m.id + "')"}"
            <h3>
               ${moduleResult === "PASS"
                ? '✅'
                : moduleResult === "FAIL"
                ? '❌'
                : moduleResult === "Processing"
                ? '⏯️'
                : locked
                ? '🔒'
                : '▶'}                 
                ${m.module_name}
            </h3>
            <p>

               ${moduleResult === "PASS"
                ? "Completed"
                : moduleResult === "FAIL"
                ? "Failed"
                : moduleResult === "Processing"
                ? "Continue to Learn"
                : locked
                ? "Locked"
                : "Ready to Learn"}
            </p>
        </div>
        `;
    });

    //status update for start new module
    const { error: trackError } = await client.from("studentcoursetracking").update({module_result: "Processing"}).eq("reg_no", studentRegno).eq("module_name",activeModuleName).eq("module_result","Not Started");
    
    if (trackError) 
        throw trackError;

    document
    .getElementById(
        "modulesGrid"
    ).innerHTML =
    html;
}

async function ViewStartButton(studentRegNo, courseName)
{
    const { data: enrollment } =await client
    .from("studentenrollment")
    .select("student_status")
    .eq("reg_no", studentRegno)
    .eq("course_name", courseName)
    .maybeSingle();

if (enrollment?.student_status === "Completed")
{
    startBtn.style.display = "none";
    return;
}
    const { data, error } = await client
        .from("studentcoursetracking")
        .select("id")
        .eq("reg_no", studentRegNo)
        .eq("course_name", courseName);

    const startBtn = document.getElementById("startCourseBtn");

    if (error)
    {
        console.log(error);
        return;
    }

    if (data && data.length > 0)
    {
        startBtn.style.display = "none";
    }
    else
    {
        startBtn.style.display = "block";
        startBtn.innerHTML = "🚀 Start Course";
        startBtn.classList.remove("disabled");
    }
}

async function StartCourse()
{
        //const studentRegno = localStorage.getItem("studentRegno");
        const studentName=localStorage.getItem("studentName");
        if (modules.length === 0)
        {
            return;
        }
        const trackingRecords = [];

for (const m of modules)
{
    // Check Quiz Availability
    let quizAvailable = false;

    if (m.quiz_id)
    {
        const { data: quiz } = await client
            .from("quizzes")
            .select("id")
            .eq("quiz_id", m.quiz_id)    
        quizAvailable = quiz != null;
    }

    // Check Assignment Availability
    let assignmentAvailable = false;

    if (m.assignment_id)
    {
        const { data: assignment } = await client
            .from("assignments")
            .select("id")
            .eq("assignment_id", m.assignment_id)
            .maybeSingle();

        assignmentAvailable = assignment != null;
    }

    trackingRecords.push({
        reg_no: studentRegno,
        student_name: studentName,
        course_name: courseName,
        module_name: m.module_name,

        video_completed: false,

        quiz_availble: quizAvailable,
        quiz_attempt: 0,
        quiz_mark_obtained_attempt1: 0,
        quiz_mark_obtained_attempt2: 0,
        quiz_mark_obtained_attempt3: 0,
        quiz_mark_obtained: 0,
        quiz_completed: false,

        assignment_availble: assignmentAvailable,
        assignment_submitted: false,
        assignment_mark_obtained: 0,
        assignment_validated: false,

        module_certificate_issued: false,
        module_result: "Not Started",
        student_status: "In Progress"
    });
}

    if (trackingRecords.length > 0)
    {
        trackingRecords[0].module_result = "Processing";
        trackingRecords[0].student_status = "In Progress";
    }
        const { error } = await client.from("studentcoursetracking").insert(trackingRecords);
    if (error)
    {
        alert(error.message);
        return;
    }
    
    //update student profile table
    // const { error: profileError } = await client.from("studentprofile").update({student_status: "In Progress"}).eq("reg_no", studentRegno);
    
    // if (profileError) 
    //     throw profileError;

    //update student enrollment table
    const { error: enrollmentError } = await client.from("studentenrollment").update({student_status: "In Progress"}).eq("reg_no", studentRegno);
    
    if (enrollmentError) 
        throw enrollmentError;

    location.reload();
}

function openModule(id)
{
    location.href ="modulePage.html?id="+id+"&course="+courseId;
}
loadCourse();


</script>

</body>
</html>
