<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Details</title>

<link rel="preconnect"  href="https://fonts.googleapis.com">
<link rel="preconnect"  href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

        /* Design Tokens & CSS Variables */
        :root {
            --bg-primary: transparent;
            --bg-secondary: #0f131a;
            --bg-sidebar: #0b0e14;
            --bg-card: rgba(18, 24, 38, 0.6);
            --bg-input: rgba(30, 41, 59, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37, 99, 235, 0.4);
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(37, 99, 235, 0.6);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-input: rgba(241, 245, 249, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.2);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            --border-color: #e2e8f0;
            --border-focus: rgba(59, 130, 246, 0.5);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    padding:30px;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    transition: var(--transition-smooth);
}

/* BACK */

.back-btn{
    background:
        rgba(255,255,255,0.08);

    padding:12px 20px;
    border-radius:16px;
    display:inline-block;
    cursor:pointer;
    margin-bottom:25px;
    transition:0.3s;
}

.back-btn:hover{
    background:
        rgba(255,255,255,0.15);
}

/* BANNER */

.course-banner{
    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:34px;

    overflow:hidden;

    display:flex;
    align-items:center;
    justify-content:space-between;

    min-height:340px;

    padding:35px;
}

.banner-img{
    width:55%;
    height:300px;
    object-fit:cover;
    border-radius:28px;
    display:block;
    box-shadow:
        0 10px 30px rgba(0,0,0,0.35);
}

.banner-content{
    width:40%;
    padding-left:35px;
}

.banner-content h1{
    font-size:42px;
    margin-bottom:10px;
}

.banner-content p{
    color:#dbeafe;
    line-height:1.8;
}

/* PROGRESS */

.progress-box{
    margin-top:25px;
}

.progress-bar{
    width:100%;
    height:12px;

    background:
        rgba(255,255,255,0.12);

    border-radius:30px;
    overflow:hidden;
}

.progress{
    height:100%;
    background:
        linear-gradient(
            90deg,
            #06b6d4,
            #3b82f6
        );
}

/* MODULES */

.section-title{
    font-size:28px;
    margin-bottom:25px;
}

.modules-grid{
    display:grid;
    grid-template-columns:
        repeat(
            auto-fit,
            minmax(300px,1fr)
        );
    gap:22px;
}

.module-card{

    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-radius:28px;

    padding:25px;

    cursor:pointer;

    transition:0.35s;
}

.module-card:hover{
    transform:
        translateY(-8px);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.3);
}

.module-card h3{
    margin-bottom:10px;
}

.module-card p{
    color:#dbeafe;
}

.locked{
    opacity:0.45;
    cursor:not-allowed;
}

.completed{
    border:
        2px solid #22c55e;
}

.action-bar
{
    display:flex;
    justify-content:flex-end;
    margin-bottom:25px;
}

.start-course-btn
{
    border:none;
    padding:14px 28px;
    border-radius:18px;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #3b82f6
        );

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
        0 8px 25px rgba(59,130,246,0.35);
}

.start-course-btn:hover
{
    transform:translateY(-3px);

    box-shadow:
        0 12px 30px rgba(59,130,246,0.45);
}

.start-course-btn.disabled
{
    background:
        rgba(255,255,255,0.15);

    cursor:not-allowed;

    box-shadow:none;

    opacity:0.7;
}

</style>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div class="back-btn"
     onclick="location.href='studentdashboardPage.html'">
    ← Back
</div>
<div class="action-bar">
    <button id="startCourseBtn"
            class="start-course-btn"
            onclick="StartCourse()">
        <i class="fa-solid fa-rocket"></i> Start Course
    </button>
</div>
<div id="courseBanner" class="course-banner">
</div>
<h2 class="section-title">
    Course Modules
</h2>

<div id="modulesGrid" class="modules-grid">
</div>
<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

const params = new URLSearchParams(window.location.search);
const courseName = params.get("course_name");
let courseId=null;
let modules = [];
let activeModuleName = "";
const studentRegno = localStorage.getItem("user" );
console.log("Course Name:", courseName);

async function loadCourse()
{
    /* COURSE */

    const { data:course} = await client.from("courses").select("*").eq("course_name", courseName).single();
    courseId = course.id;

    /* MODULES */

    const { data} =await client.from("videos")
    .select("*")
    .eq("course_id", courseId)
    .order("module_name", { ascending: true });
    modules = data || [];

    /* STUDENT TRACKING */
    ViewStartButton(studentRegno,courseName);
   // const studentRegno = localStorage.getItem("studentRegno" );
    
    const {data:tracking}= await client.from("studentcoursetracking").select("*").eq("reg_no",studentRegno).eq("course_name",course.course_name);

    /* MAP */

    const completedMap ={};
    tracking.forEach(
        t =>
    {
        if(
            t.quiz_completed
        )
        {
            completedMap[
                t.module_name
            ] = true;
        }
    });

    /* PROGRESS */

    let completedCount = 0;

    modules.forEach(
        m =>
    {
        if(
            completedMap[
                m.module_name
            ]
        )
        {
            completedCount++;
        }
    });

    const percent = Math.round((completedCount /modules.length) * 100);

    /* BANNER */

    document
    .getElementById(
        "courseBanner"
    ).innerHTML =

    `

    <img src="${course.thumbnail}"
         class="banner-img">

    <div class="banner-content">

        <h1>
            ${course.course_name}
        </h1>

        <p>
            ${course.description}
        </p>

        <div class="progress-box">

            <div class="progress-bar">

                <div class="progress"
                     style="
                     width:${percent}%">
                </div>

            </div>

            <div style="margin-top:10px">

                ${percent}% Completed

            </div>

        </div>

    </div>

    `;

    /* MODULES */

    let html = "";

    modules.forEach(
        (m,index)=>
    {
       const moduleTracking =
    tracking.find(
        t => t.module_name === m.module_name
    );

const moduleResult = moduleTracking?.module_result || "";
const completed = moduleResult === "PASS";
const disabled =    moduleResult === "PASS" ||  moduleResult === "FAIL";
let locked = true;
const courseStarted =   tracking &&  tracking.length > 0;

if (!courseStarted)
{
    locked = true;
}
else if (disabled)
{
    locked = true;
}
else if (index === 0)
{
    locked = false;
}
else
{
    const prev = modules[index - 1];
    locked =
        !completedMap[
            prev.module_name
        ];
}
if (!locked && !disabled)
{
    activeModuleName = m.module_name;

}

        html += `

        <div class="module-card
             ${locked?"locked":""}
             ${completed?"completed":""}"

             onclick="
${(locked || disabled)
? ''
: "openModule('" + m.id + "')"}
"

            <h3>
                ${moduleResult === "PASS"
?'<i class="fa-solid fa-check-circle" style="color: var(--accent-green)"></i>'
:moduleResult === "FAIL"
?'<i class="fa-solid fa-times-circle" style="color: var(--accent-red)"></i>'
:locked
?'<i class="fa-solid fa-lock"></i>'
:'<i class="fa-solid fa-play" style="color: var(--accent-blue)"></i>'}
                ${m.module_name}
            </h3>

            <p>

                ${moduleResult === "PASS"
?"Completed"
:moduleResult === "FAIL"
?"Failed"
:locked
?"Locked"
:"Ready to learn"}

            </p>

        </div>

        `;
    });

    //status update for start new module
    const { error: trackError } = await client.from("studentcoursetracking").update({module_result: "Processing"}).eq("reg_no", studentRegno).eq("module_name",activeModuleName).eq("module_result","Not Started");
    
    if (trackError) 
        throw trackError;

    document
    .getElementById(
        "modulesGrid"
    ).innerHTML =
    html;
}

async function ViewStartButton(studentRegNo, courseName)
{
    const { data: enrollment } =await client
    .from("studentenrollment")
    .select("student_status")
    .eq("reg_no", studentRegno)
    .eq("course_name", courseName)
    .maybeSingle();

if (enrollment?.student_status === "Completed")
{
    startBtn.style.display = "none";
    return;
}
    const { data, error } = await client
        .from("studentcoursetracking")
        .select("id")
        .eq("reg_no", studentRegNo)
        .eq("course_name", courseName);

    const startBtn = document.getElementById("startCourseBtn");

    if (error)
    {
        console.log(error);
        return;
    }

    if (data && data.length > 0)
    {
        startBtn.style.display = "none";
    }
    else
    {
        startBtn.style.display = "block";
        startBtn.innerHTML = "<i class='fa-solid fa-rocket'></i> Start Course";
        startBtn.classList.remove("disabled");
    }
}

async function StartCourse()
{
        //const studentRegno = localStorage.getItem("studentRegno");
        const studentName=localStorage.getItem("studentName");
        if (modules.length === 0)
        {
            return;
        }
        const trackingRecords = modules.map(m => ({
        reg_no: studentRegno,
        student_name: studentName,
        course_name: courseName,
        module_name: m.module_name,
        video_completed: false,
        quiz_availble: false,
        quiz_attempt: 0,
        quiz_completed: false,
        assignment_availble: false,
        assignment_completed: false,
        module_result: "Not Started",
        student_status: "In Progress"
    }));

    if (trackingRecords.length > 0)
    {
        trackingRecords[0].module_result = "Processing";
        trackingRecords[0].student_status = "In Progress";
    }
        const { error } = await client
        .from("studentcoursetracking")
        .insert(trackingRecords);

    if (error)
    {
        alert(error.message);
        return;
    }
    
    //update student profile table
    // const { error: profileError } = await client.from("studentprofile").update({student_status: "In Progress"}).eq("reg_no", studentRegno);
    
    // if (profileError) 
    //     throw profileError;

    //update student enrollment table
    const { error: enrollmentError } = await client.from("studentenrollment").update({student_status: "In Progress"}).eq("reg_no", studentRegno);
    
    if (enrollmentError) 
        throw enrollmentError;

    location.reload();
}

function openModule(id)
{
    location.href ="modulePage.html?id="+id+"&course="+courseId;
}
loadCourse();


</script>


    <script>
        // Global Theme Support
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("student-theme") || "dark";
            document.documentElement.setAttribute("data-theme", savedTheme);
        });

        // Listen for theme changes from parent iframe wrapper
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'themeChange') {
                document.documentElement.setAttribute('data-theme', event.data.theme);
            }
        });
    </script>
</body>
</html>
