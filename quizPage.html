<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

        /* Design Tokens & CSS Variables */
        :root {
            --bg-primary: transparent;
            --bg-secondary: #0f131a;
            --bg-sidebar: #0b0e14;
            --bg-card: rgba(18, 24, 38, 0.6);
            --bg-input: rgba(30, 41, 59, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37, 99, 235, 0.4);
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(37, 99, 235, 0.6);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-input: rgba(241, 245, 249, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.2);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            --border-color: #e2e8f0;
            --border-focus: rgba(59, 130, 246, 0.5);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    padding:35px;
    background-color: var(--bg-primary);
    display:flex;
    justify-content:center;
    align-items:center;
    color: var(--text-primary);
    transition: var(--transition-smooth);
}

/* CARD */

.quiz-card{

    width:100%;
    max-width:900px;

    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:34px;

    padding:40px;
}

.quiz-title{

    font-size:34px;

    margin-bottom:25px;

    text-align:center;
}

#question{

    font-size:26px;

    margin-bottom:35px;

    line-height:1.5;
}

/* OPTIONS */

.option{

    background:
        rgba(255,255,255,0.08);

    padding:20px;

    border-radius:22px;

    margin-bottom:18px;

    cursor:pointer;

    transition:0.3s;

    border:
        2px solid transparent;
}

.option:hover{

    background:
        rgba(255,255,255,0.15);

    transform:
        translateX(5px);
}

.option.selected{

    border:
        2px solid #3b82f6;

    background:
        rgba(59,130,246,.2);
}

/* BUTTON */

.submit-wrap{
    text-align:center;
    margin-top:30px;
}

#submitBtn{

    border:none;

    padding:18px 38px;

    border-radius:20px;

    font-size:18px;

    font-weight:600;

    color:white;

    cursor:pointer;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #2563eb
        );

    transition:0.3s;
}

#submitBtn:hover{
    transform:
        translateY(-3px);
}

/* RESULT */

.result{

    display:none;

    margin-top:25px;

    padding:18px;

    border-radius:18px;

    text-align:center;

    font-size:18px;
}

.success{
    background:
        linear-gradient(
            135deg,
            #16a34a,
            #22c55e
        );
}

.fail{
    background:
        linear-gradient(
            135deg,
            #dc2626,
            #ef4444
        );
}

</style>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="quiz-card">

    <div class="quiz-title">
        <i class="fa-solid fa-file-alt"></i>  Module Quiz
    </div>

    <h2 id="question">
        Loading...

    </h2>
    <div id="options">

    </div>

    <div class="submit-wrap">

        <button id="submitBtn">

            Submit Quiz

        </button>

    </div>

    <div id="successMsg"
         class="result success">

         Quiz Passed

    </div>

    <div id="failMsg"
         class="result fail">

         Wrong Answer

    </div>

</div>

<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

const params =new URLSearchParams(window.location.search);
const quizId =params.get("quiz");
const moduleId =params.get("module");
const courseId =params.get("course");
const moduleName =decodeURIComponent(params.get("moduleName"));
const courseName =decodeURIComponent(params.get("courseName"));
const studentRegno = localStorage.getItem("user");
let quizQuestions = [];
let answers = {};

async function loadQuiz()
{
    const { data,error} = await client.from("quizzes").select("*").eq("quiz_id",quizId);
    if(error)
    {
        console.log(error);
        return;
    }

    quizQuestions =data;
    let html="";
    data.forEach((q,index)=>
    {
        html += `
        <div class="question-card">
            <h3>
                Q${index+1}.
                ${q.question}
            </h3>
            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option1}')"> ${q.option1}
            </div>

            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option2}')">${q.option2}
            </div>

            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option3}')">${q.option3}
            </div>

            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option4}')">${q.option4}
            </div>
        </div>
        `;
    });

    document.getElementById("question").style.display ="none";
    document.getElementById("options" ).innerHTML =  html;
}

function selectOption(element,questionId,answer)
{
    const parent = element.parentElement;
    parent.querySelectorAll(".option").forEach(o =>o.classList.remove("selected"));
    element.classList.add("selected");
    answers[questionId] = answer;
}

document
.getElementById(
    "submitBtn"
)
.onclick =
async function()
{
    

    const {
        data:tracking
    }
    =
    await client
        .from(
            "studentcoursetracking"
        )
        .select("*")
        .eq(
            "reg_no",
            studentRegno
        )
        .eq(
            "course_name",
            courseName
        )
        .eq(
            "module_name",
            moduleName
        )
        .single();

    let attempt =
    tracking?.quiz_attempt || 0;

    if(attempt >= 3)
    {
        alert(
            "Maximum 3 attempts reached"
        );
        return;
    }

    let score = 0;

    quizQuestions.forEach(
        q =>
    {
        if(
            answers[q.id] ===
            q.correct_answer
        )
        {
            score++;
        }
    });

    const percent =
    Math.round(
        (
            score /
            quizQuestions.length
        ) * 100
    );

    attempt++;

    const result =
    percent >= 60
    ? "PASS"
    : "FAIL";

    const updateData =
    {
        quiz_attempt:
            attempt,

        quiz_mark_obtained:
            percent + "%"
    };

    if(attempt === 1)
    {
        updateData.quiz_mark_obtained_attempt1 =
        percent + "%";
    }

    if(attempt === 2)
    {
        updateData.quiz_mark_obtained_attempt2 =
        percent + "%";
    }

    if(attempt === 3)
    {
        updateData.quiz_mark_obtained_attempt3 =
        percent + "%";
    }

    if(result === "PASS")
    {
        updateData.quiz_completed = true;
        updateData.module_result = "PASS";
        const moduleScore = 70 + (percent * 0.30);
        updateData.module_score = moduleScore.toFixed(0) + "%";
    }
    else
    {
        updateData.quiz_completed = false;
        if(attempt >= 3)
        {
            updateData.module_result ="FAIL";
        }
        else
        {
            updateData.module_result = "Retest";
            updateData.video_completed = false;
            updateData.video_lastwatched ="0";
        }
    }
    await client.from("studentcoursetracking").update(updateData).eq("reg_no",studentRegno).eq("course_name",courseName).eq("module_name",moduleName);
    if(result === "PASS")
    {
        successMsg.innerHTML =
        `
         Passed
        <br><br>
        Score : ${percent}%
        <br><br>
        Attempt : ${attempt}/3
        `;

        successMsg.style.display =
        "block";
    }
    else
    {
        failMsg.innerHTML =
`
 Failed
<br><br>
Score : ${percent}%
<br><br>
Attempt : ${attempt}/3
<br><br>

<button
    onclick="
        location.href='modulePage.html?id=${moduleId}&course=${courseId}'
    "
    style="
        border:none;
        padding:12px 24px;
        border-radius:12px;
        cursor:pointer;
        font-weight:600;
        margin-top:10px;
    ">
    <i class="fa-solid fa-play"></i> Watch Video Again
</button>
`;

        failMsg.style.display =
        "block";
    }

    const { data: allModules } =await client.from("studentcoursetracking").select("*").eq("reg_no", studentRegno).eq("course_name", courseName);
    const courseCompleted =  allModules && allModules.length > 0 && allModules.every(
        m =>
            m.module_result === "PASS" ||
            m.module_result === "FAIL"
    );

    if (courseCompleted)
    {
        const totalScore = allModules.reduce((sum, m) => sum + parseFloat((m.module_score || "0").replace("%", "") ), 0);
        const averageScoreNum=(totalScore / allModules.length).toFixed(2);
        let overallResult=null;
        if(averageScoreNum >=60)
          overallResult="PASS";
        else
          overallResult="FAIL";
        const averageScore = (
            totalScore /
            allModules.length
        ).toFixed(2) + "%";


    const studentName =
        localStorage.getItem(
            "studentName"
        );

   
     await client.from("studentenrollment")
        .update({
            student_status: "Completed",
            course_completed:true,
            mark_obtained:averageScore.toString(),
            overall_result:overallResult,
            cerificate_issued:true

        })
        .eq("reg_no", studentRegno)
        .eq("course_name", courseName);

    

    console.log(
        "Average Score:",
        averageScore
    );
}
   
};

loadQuiz();

</script>


    <script>
        // Global Theme Support
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("student-theme") || "dark";
            document.documentElement.setAttribute("data-theme", savedTheme);
        });

        // Listen for theme changes from parent iframe wrapper
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'themeChange') {
                document.documentElement.setAttribute('data-theme', event.data.theme);
            }
        });
    </script>
</body>
</html>
