<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{

    min-height:100vh;

    padding:35px;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #172554,
        #1d4ed8
    );

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
}

/* CARD */

.quiz-card{

    width:100%;
    max-width:900px;

    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:34px;

    padding:40px;
}

.quiz-title{

    font-size:34px;

    margin-bottom:25px;

    text-align:center;
}

#question{

    font-size:26px;

    margin-bottom:35px;

    line-height:1.5;
}

/* OPTIONS */

.option{

    background:
        rgba(255,255,255,0.08);

    padding:20px;

    border-radius:22px;

    margin-bottom:18px;

    cursor:pointer;

    transition:0.3s;

    border:
        2px solid transparent;
}

.option:hover{

    background:
        rgba(255,255,255,0.15);

    transform:
        translateX(5px);
}

.option.selected{

    border:
        2px solid #3b82f6;

    background:
        rgba(59,130,246,.2);
}

/* BUTTON */

.submit-wrap{
    text-align:center;
    margin-top:30px;
}

#submitBtn{

    border:none;

    padding:18px 38px;

    border-radius:20px;

    font-size:18px;

    font-weight:600;

    color:white;

    cursor:pointer;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #2563eb
        );

    transition:0.3s;
}

#submitBtn:hover{
    transform:
        translateY(-3px);
}

/* RESULT */

.result{

    display:none;

    margin-top:25px;

    padding:18px;

    border-radius:18px;

    text-align:center;

    font-size:18px;
}

.success{
    background:
        linear-gradient(
            135deg,
            #16a34a,
            #22c55e
        );
}

.fail{
    background:
        linear-gradient(
            135deg,
            #dc2626,
            #ef4444
        );
}

</style>

</head>

<body>

<div class="quiz-card">

    <div class="quiz-title">
        📝 Module Quiz
    </div>

    <h2 id="question">
        Loading...
    </h2>
    <div id="options">
    </div>

    <div class="submit-wrap">

        <button id="submitBtn">
            Submit Quiz
        </button>

    </div>

    <div id="successMsg" class="result success">
        🎉 Quiz Passed
    </div>

    <div id="failMsg" class="result fail">
        ❌ Wrong Answer
    </div>
</div>
<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

const params =new URLSearchParams(window.location.search);
const quizId =params.get("quiz");
const moduleId =params.get("module");
const courseId =params.get("course");
const moduleName =decodeURIComponent(params.get("moduleName"));
const courseName =decodeURIComponent(params.get("courseName"));
const studentRegno = localStorage.getItem("user");
let quizQuestions = [];
let answers = {};

async function loadQuiz()
{
    const { data,error} = await client.from("quizzes").select("*").eq("quiz_id",quizId);
    if(error)
    {
        console.log(error);
        return;
    }

    quizQuestions =data;
    let html="";
    data.forEach((q,index)=>
    {
        html += `
        <div class="question-card">
            <h3>
                Q${index+1}.
                ${q.question}
            </h3>
            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option1}')"> ${q.option1}
            </div>

            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option2}')">${q.option2}
            </div>

            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option3}')">${q.option3}
            </div>

            <div class="option"
                 onclick="selectOption(this,'${q.id}','${q.option4}')">${q.option4}
            </div>
        </div>
        `;
    });

    document.getElementById("question").style.display ="none";
    document.getElementById("options" ).innerHTML =  html;
}

function selectOption(element,questionId,answer)
{
    const parent = element.parentElement;
    parent.querySelectorAll(".option").forEach(o =>o.classList.remove("selected"));
    element.classList.add("selected");
    answers[questionId] = answer;
}

document.getElementById( "submitBtn").onclick =async function()
{
    const {data:tracking }  = await client.from("studentcoursetracking").select("*").eq("reg_no", studentRegno )
        .eq("course_name", courseName).eq("module_name", moduleName).single();
     let certificateModNo ="";
   
    const assignmentAvailable=tracking.assignment_availble;
    const assignmentSubmitted=tracking.assignment_submitted;
    const assignmentValidate=tracking.assignment_validated;
    const assignmentMark = parseFloat((tracking.assignment_mark_obtained || "0%").replace("%", ""));


    let attempt =tracking?.quiz_attempt || 0;

    if(attempt >= 3)
    {
        alert("Maximum 3 attempts reached");
        return;
    }

    let score = 0;
    quizQuestions.forEach(q =>
    {
        if(answers[q.id] === q.correct_answer)
        {
            score++;
        }
    });

    const percent = Math.round(( score / quizQuestions.length ) * 100);
    attempt++;
    const result = percent >= 60 ? "PASS" : "FAIL";

    const updateData =
    {
        quiz_attempt:attempt,
        quiz_mark_obtained:  percent + "%"
    };

    if(attempt === 1)
    {
        updateData.quiz_mark_obtained_attempt1 = percent + "%";
    }

    if(attempt === 2)
    {
        updateData.quiz_mark_obtained_attempt2 = percent + "%";
    }

    if(attempt === 3)
    {
        updateData.quiz_mark_obtained_attempt3 = percent + "%";
    }

    if(result === "PASS")
    {
        updateData.quiz_completed = true;
        if(assignmentAvailable)
        {
            if(assignmentValidate)
            {
                updateData.module_result = "PASS";
                const moduleScore = 50 + (percent * 0.30)+assignmentMark;
                updateData.module_score = moduleScore.toFixed(0) + "%";
                certificateModNo ="NGL-M" + new Date().getFullYear() + "-" + String(Date.now()).slice(-5);
                updateData.module_certificate_issued=true;
                updateData.module_certificate_no=certificateModNo;
                updateData.module_certificate_date=new Date().toISOString();
            }
            else
            {
                updateData.module_result = "Processing";
                const moduleScore = 50 + (percent * 0.30);
                updateData.module_score = moduleScore.toFixed(0) + "%";
            }
        }
        else
        {
            updateData.module_result = "PASS";
            const moduleScore = 70 + (percent * 0.30);
            updateData.module_score = moduleScore.toFixed(0) + "%";
            certificateModNo ="NGL-M" + new Date().getFullYear() + "-" + String(Date.now()).slice(-5);
            updateData.module_certificate_issued=true;
            updateData.module_certificate_no=certificateModNo;
            updateData.module_certificate_date=new Date().toISOString();
        }
       
    }
    else
    {
        updateData.quiz_completed = false;
        if(attempt >= 3)
        {
            updateData.quiz_completed = true;
            if(assignmentAvailable)
            {
                if(assignmentValidate)
                {
                    const moduleScore = 50 + (percent * 0.30)+assignmentMark;
                    updateData.module_score = moduleScore.toFixed(0) + "%";
                    updateData.module_result ="FAIL";
                    updateData.module_certificate_issued=false;
                }
                else
                {
                    const moduleScore = 50 + (percent * 0.30);
                    updateData.module_score = moduleScore.toFixed(0) + "%";
                    updateData.module_result ="Processing";
                    updateData.module_certificate_issued=false;
                }
            }
            else
            {
                const moduleScore = 70 + (percent * 0.30);
                updateData.module_score = moduleScore.toFixed(0) + "%";
                updateData.module_result ="FAIL";
                updateData.module_certificate_issued=false;
            }
        }
        else
        {
            updateData.module_result = "Retest";
            updateData.video_completed = false;
            updateData.video_lastwatched ="0";
        }
    }
    await client.from("studentcoursetracking").update(updateData).eq("reg_no",studentRegno).eq("course_name",courseName).eq("module_name",moduleName);
    if(result === "PASS")
    {
        if(updateData.module_result==="Processing" && assignmentAvailable)
        {
            successMsg.innerHTML =
        `
        🎉 Passed
        <br><br>
        Score : ${percent}%
        <br><br>
        Attempt : ${attempt}/3
        <br><br>

        <button
            onclick="
                location.href='modulePage.html?id=${moduleId}&course=${courseId}'
            "
            style="
                border:none;
                padding:12px 24px;
                border-radius:12px;
                cursor:pointer;
                font-weight:600;
                margin-top:10px;
            ">
           Continue Assignment
        </button>
        `;
        successMsg.style.display = "block";
        }
        else
        {
             successMsg.innerHTML =
        `
        🎉 Passed
        <br><br>
        Score : ${percent}%
        <br><br>
        Attempt : ${attempt}/3
        
        `;
        successMsg.style.display = "block";

        }
       
    }
    else
    {
       
        failMsg.innerHTML =
        `
        ❌ Failed
        <br><br>
        Score : ${percent}%
        <br><br>
        Attempt : ${attempt}/3
        <br><br>

        <button
            onclick="
                location.href='modulePage.html?id=${moduleId}&course=${courseId}'
            "
            style="
                border:none;
                padding:12px 24px;
                border-radius:12px;
                cursor:pointer;
                font-weight:600;
                margin-top:10px;
            ">
            ▶ Watch Video Again
        </button>
        `;

      
        failMsg.style.display = "block";
    }

    const { data: allModules } =await client.from("studentcoursetracking").select("*").eq("reg_no", studentRegno).eq("course_name", courseName);
    const courseCompleted =  allModules && allModules.length > 0 && allModules.every(
        m =>
            m.module_result === "PASS" ||
            m.module_result === "FAIL"
    );

    if (courseCompleted)
    {
        const totalScore = allModules.reduce((sum, m) => sum + parseFloat((m.module_score || "0").replace("%", "") ), 0);
        const averageScoreNum=(totalScore / allModules.length).toFixed(2);
        let overallResult=null;
        if(averageScoreNum >=60)
          overallResult="PASS";
        else
          overallResult="FAIL";
        const averageScore = (
            totalScore /
            allModules.length
        ).toFixed(2) + "%";


    const studentName = localStorage.getItem("studentName");
    const certificateNo ="NGL-C" + new Date().getFullYear() + "-" + String(Date.now()).slice(-6);
   
     await client.from("studentenrollment")
        .update({
            student_status: "Completed",
            course_completed:true,
            mark_obtained:averageScore.toString(),
            overall_result:overallResult,
            cerificate_issued:true,
            certificate_no:certificateNo,
            certificate_date:new Date().toISOString()

        })
        .eq("reg_no", studentRegno)
        .eq("course_name", courseName);

    

    console.log(
        "Average Score:",
        averageScore
    );
}
   
};

loadQuiz();

</script>

</body>
</html>
