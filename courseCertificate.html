<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Certificate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#eef4ff;
    padding:30px;
}

.top-bar{
    text-align:center;
    margin-bottom:20px;
}

.download-btn{
    border:none;
    padding:14px 30px;
    border-radius:12px;
    background:#2563eb;
    color:white;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
}

.download-btn:hover{
    background:#1d4ed8;
}

.certificate{

    max-width:1200px;
    margin:auto;

    background:white;

    border:12px solid #2563eb;

    padding:60px;

    text-align:center;

    position:relative;

    box-shadow:
        0 10px 30px rgba(0,0,0,0.15);
}

.logo{
    width:220px;
    margin-bottom:20px;
}

.certificate-no{
    position:absolute;
    top:20px;
    right:25px;
    color:#666;
    font-size:14px;
}

.title{
    font-size:48px;
    font-weight:700;
    color:#1d4ed8;
    margin-bottom:20px;
}

.sub-title{
    font-size:20px;
    color:#666;
}

.student-name{
    font-size:44px;
    font-weight:700;
    color:#111;
    margin:30px 0;
}

.course-name{
    font-size:34px;
    color:#2563eb;
    font-weight:600;
    margin:20px 0;
}

.info{
    margin-top:15px;
    font-size:22px;
}

.footer{
    margin-top:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.signature{
    text-align:center;
}

.line{
    width:220px;
    border-top:2px solid #000;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="top-bar">

    <button class="download-btn"
            onclick="downloadPDF()">

        📄 Download PDF

    </button>

</div>

<div id="certificate"
     class="certificate">

    <div id="certificateNo"
         class="certificate-no">
    </div>

    <img src="logo.png"
         class="logo">

    <div class="title">
        CERTIFICATE OF COURSE COMPLETION
    </div>

    <div class="sub-title">
        This certificate is proudly presented to
    </div>

    <div id="studentName"
         class="student-name">
        Loading...
    </div>

    <div class="sub-title">
        For successfully completing
    </div>

    <div id="courseName"
         class="course-name">
    </div>

    <div class="info">
        Average Score :
        <strong id="markObtained"></strong>
    </div>

    <div class="info">
        Overall Result :
        <strong id="overallResult"></strong>
    </div>

    <div class="info">
        Completion Date :
        <strong id="certificateDate"></strong>
    </div>

    <div class="footer">

        <div>
            NextGEN Learners
        </div>

        <div class="signature">

            <div class="line"></div>

            Authorized Signatory

        </div>

    </div>

</div>

<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

const params =
new URLSearchParams(
    window.location.search
);

const regNo =
params.get("regNo");

const courseName =
params.get("course");

async function loadCertificate()
{
    const {
        data,
        error
    }
    =
    await client
        .from(
            "studentenrollment"
        )
        .select("*")
        .eq(
            "reg_no",
            regNo
        )
        .eq(
            "course_name",
            courseName
        )
        .single();

    if(error)
    {
        alert(error.message);
        return;
    }

    document.getElementById(
        "studentName"
    ).innerText =
    data.student_name;

    document.getElementById(
        "courseName"
    ).innerText =
    data.course_name;

    document.getElementById(
        "markObtained"
    ).innerText =
    data.mark_obtained || "-";

    document.getElementById(
        "overallResult"
    ).innerText =
    data.overall_result || "-";

    document.getElementById(
        "certificateNo"
    ).innerText =
    "Certificate No : " +
    (data.certificate_no || "N/A");

    document.getElementById(
        "certificateDate"
    ).innerText =
    data.certificate_date
    ?
    new Date(
        data.certificate_date
    ).toLocaleDateString()
    :
    "-";
}

function downloadPDF()
{
    const element =
    document.getElementById(
        "certificate"
    );

    html2pdf()
        .set({
            margin:0,
            filename:
            'Course_Certificate.pdf',
            image:{
                type:'jpeg',
                quality:1
            },
            html2canvas:{
                scale:2
            },
            jsPDF:{
                unit:'mm',
                format:'a4',
                orientation:'landscape'
            }
        })
        .from(element)
        .save();
}

loadCertificate();

</script>

</body>
</html>
