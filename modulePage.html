<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Module Learning</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

        /* Design Tokens & CSS Variables */
        :root {
            --bg-primary: transparent;
            --bg-secondary: #0f131a;
            --bg-sidebar: #0b0e14;
            --bg-card: rgba(18, 24, 38, 0.6);
            --bg-input: rgba(30, 41, 59, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent-blue: #2563eb;
            --accent-blue-glow: rgba(37, 99, 235, 0.4);
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #3b82f6 50%, #60a5fa 100%);
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(37, 99, 235, 0.6);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 8px;
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Space Grotesk', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-sidebar: #0f172a;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-input: rgba(241, 245, 249, 0.8);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.2);
            --accent-gradient: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            --border-color: #e2e8f0;
            --border-focus: rgba(59, 130, 246, 0.5);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    padding:35px;
    background-color: var(--bg-primary);
    color: var(--text-primary);
    transition: var(--transition-smooth);
}

/* BACK */

.back-btn{
    display:inline-block;
    padding:12px 22px;
    background:
        rgba(255,255,255,0.08);
    border-radius:16px;
    cursor:pointer;
    margin-bottom:28px;
    transition:0.3s;
}

.back-btn:hover{
    background:
        rgba(255,255,255,0.15);
}

/* CARD */

.main-card{

    max-width:1200px;

    margin:auto;

    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:36px;

    padding:35px;
}

#moduleTitle{
    font-size:42px;
    margin-bottom:28px;
}

/* VIDEO */

.video-wrapper{

    width:100%;

    max-width:950px;

    margin:0 auto 35px;

    border-radius:30px;

    overflow:hidden;

    background:#000;

    box-shadow:
        0 15px 40px rgba(
            0,0,0,.35
        );
}

video{
    width:100%;
    height:520px;
    display:block;
    object-fit:contain;
    background:#000;
}

/* QUIZ BUTTON */

.quiz-section{
    text-align:center;
    margin-top:20px;
}

#quizBtn{

    border:none;

    padding:18px 36px;

    border-radius:20px;

    font-size:18px;

    font-weight:600;

    color:white;

    background:
        rgba(255,255,255,0.1);

    cursor:not-allowed;

    transition:0.35s;
}

#quizBtn.enabled{

    cursor:pointer;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #2563eb
        );

    box-shadow:
        0 12px 28px rgba(
            37,99,235,.35
        );
}

#quizBtn.enabled:hover{
    transform:
        translateY(-4px);
}

.info{
    text-align:center;
    color:#cbd5e1;
    margin-top:18px;
}

</style>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

<div class="back-btn"
     onclick="
     location.href=
     'coursePage.html?course_name=' +
     encodeURIComponent(
         localStorage.getItem('selectedCourseName')
     )">
    ← Back
</div>

<div class="main-card">

    <h1 id="moduleTitle">
        Loading...
    </h1>

    <div class="video-wrapper">

        <video id="videoPlayer"
               controls>

        </video>

    </div>

    <div class="quiz-section">

        <button id="quizBtn"
                disabled>

            <i class="fa-solid fa-lock"></i> Complete Video to Start Quiz

        </button>

        <div class="info">

            Watch the full video to unlock quiz

        </div>

    </div>

</div>

<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );

const params =new URLSearchParams(window.location.search);

const moduleId =params.get("id");
const courseId =params.get("course");
let quizId = "";
const video =document.getElementById("videoPlayer");
const studentRegno =localStorage.getItem("user");

async function loadModule()
{
    /* LOAD MODULE */
    const { data,error} =await client.from("videos").select("*").eq("id",moduleId).single();

    if(error)
    {
        console.log(error);
        return;
    }

    /* LOAD COURSE */

    const { data:course, error:courseError}= await client.from("courses").select("*").eq("id",courseId).single();

    if(courseError)
    {
        console.log(courseError);
        return;
    }

    /* STORE VALUES */

    window.moduleName =data.module_name;
    window.courseName =  course.course_name;
    quizId = data.quiz_id;

    /* UI */
    document.getElementById("moduleTitle").innerHTML =  data.module_name;
    document.getElementById("videoPlayer").src = data.video_url;

    /* TRACKING */
    const {data: tracking,error: trackingError}=await client
    .from("studentcoursetracking").select("video_lastwatched,video_completed")
    .eq("reg_no",studentRegno).eq("course_name",course.course_name).eq("module_name",data.module_name).maybeSingle();
    console.log("Tracking:",tracking);
    video.load();

/* RESUME VIDEO */
    video.addEventListener("loadedmetadata",function()
    {
        if (tracking &&tracking.video_lastwatched && parseFloat(tracking.video_lastwatched) > 0)
        {
            const lastPosition =parseFloat(tracking.video_lastwatched);
            console.log("Resume Position:",lastPosition);
            video.currentTime =lastPosition;
        }
    },{ once: true }
);

/* QUIZ BUTTON */

    if (tracking && tracking.video_completed)
    {
        enableQuizButton();
    }
}

setInterval(async function()
{
    if(video.paused || !video.duration)
    {
        return;
    }
    const percentage =Math.round((video.currentTime / video.duration) * 100);
    const moduleScore=(Math.round(percentage*0.7)).toString()+"%";
    await client.from("studentcoursetracking").update({
            video_lastwatched:video.currentTime.toString(),
            module_score:moduleScore
        }).eq("reg_no",studentRegno).eq("course_name",courseName).eq("module_name", moduleName);},5000);

video.addEventListener("pause",async function()
{
    if(!video.duration)
    {
        return;
    }
    const percentage =Math.round((video.currentTime /video.duration) * 100);
    const moduleScore=(Math.round(percentage*0.7)).toString()+"%";
    
    await client.from("studentcoursetracking").update({
            video_lastwatched: video.currentTime.toString(),
            module_score:moduleScore
        }).eq("reg_no",studentRegno).eq("course_name",courseName).eq("module_name",moduleName );});

video.onended =
async function()
{
    await client.from("studentcoursetracking").update({
        video_completed:true,
        video_lastwatched: video.duration.toString(),
        quiz_availble:true
    }).eq(
        "reg_no",
        studentRegno
    )
    .eq(
        "course_name",
        courseName
    )
    .eq(
        "module_name",
        moduleName
    );

    enableQuizButton();
};

function enableQuizButton()
{
    const btn =document.getElementById("quizBtn");
    btn.disabled = false;
    btn.classList.add("enabled");
    btn.innerHTML ="<i class='fa-solid fa-file-alt'></i>  Start Quiz";
    btn.onclick = function()
    {
        location.href =
        "quizPage.html"+
        "?quiz="+quizId+
        "&module="+moduleId+
        "&course="+courseId+
        "&moduleName="+
        encodeURIComponent(
            moduleName
        )+
        "&courseName="+
        encodeURIComponent(
            courseName
        );
    };
}
loadModule();
</script>


    <script>
        // Global Theme Support
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem("student-theme") || "dark";
            document.documentElement.setAttribute("data-theme", savedTheme);
        });

        // Listen for theme changes from parent iframe wrapper
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'themeChange') {
                document.documentElement.setAttribute('data-theme', event.data.theme);
            }
        });
    </script>
</body>
</html>
