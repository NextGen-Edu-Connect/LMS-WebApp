<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Module Learning</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    min-height:100vh;
    padding:35px;

    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #172554,
        #1d4ed8
    );

    color:white;
}

/* BACK */

.back-btn{
    display:inline-block;
    padding:12px 22px;
    background:
        rgba(255,255,255,0.08);
    border-radius:16px;
    cursor:pointer;
    margin-bottom:28px;
    transition:0.3s;
}

.back-btn:hover{
    background:
        rgba(255,255,255,0.15);
}

/* CARD */

.main-card{

    max-width:1200px;

    margin:auto;

    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border:
        1px solid rgba(255,255,255,0.08);

    border-radius:36px;

    padding:35px;
}

#moduleTitle{
    font-size:42px;
    margin-bottom:28px;
}

/* VIDEO */

.video-wrapper{

    width:100%;

    max-width:950px;

    margin:0 auto 35px;

    border-radius:30px;

    overflow:hidden;

    background:#000;

    box-shadow:
        0 15px 40px rgba(
            0,0,0,.35
        );
}

video{
    width:100%;
    height:520px;
    display:block;
    object-fit:contain;
    background:#000;
}

/* QUIZ BUTTON */

.quiz-section{
    text-align:center;
    margin-top:20px;
}

#quizBtn{

    border:none;

    padding:18px 36px;

    border-radius:20px;

    font-size:18px;

    font-weight:600;

    color:white;

    background:
        rgba(255,255,255,0.1);

    cursor:not-allowed;

    transition:0.35s;
}

#quizBtn.enabled{

    cursor:pointer;

    background:
        linear-gradient(
            135deg,
            #06b6d4,
            #2563eb
        );

    box-shadow:
        0 12px 28px rgba(
            37,99,235,.35
        );
}

#quizBtn.enabled:hover{
    transform:
        translateY(-4px);
}

.info{
    text-align:center;
    color:#cbd5e1;
    margin-top:18px;
}

</style>

</head>

<body>

<div class="back-btn"
     onclick="history.back()">

    ← Back

</div>

<div class="main-card">

    <h1 id="moduleTitle">
        Loading...
    </h1>

    <p id="videoSubtitle" style="color:#93c5fd;font-size:16px;margin-bottom:24px;margin-top:-16px;"></p>

    <div class="video-wrapper">

        <video id="videoPlayer"
               controls>

        </video>

    </div>

    <div class="quiz-section">

        <button id="quizBtn"
                disabled>

            🔒 Complete Video to Start Quiz

        </button>

        <div class="info">

            Watch the full video to unlock quiz

        </div>

    </div>

</div>

<script>

const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// BUG FIX #7: old code read params "id" and "course" — neither is sent by
// coursePage.html. The correct keys are "course_name" and "module_name".
const params = new URLSearchParams(window.location.search);
const courseName  = decodeURIComponent(params.get("course_name") || "");
const moduleName  = decodeURIComponent(params.get("module_name") || "");

let quizId = "";

async function loadModule()
{
    if (!courseName || !moduleName)
    {
        document.getElementById("moduleTitle").textContent = "Module not found in URL.";
        return;
    }

    // BUG FIX #8: old code fetched by .eq("id", moduleId) where moduleId came
    // from params.get("id") — always null. Must fetch by course_id + module_name.
    const { data, error } =
        await client
            .from("videos")
            .select("*")
            .eq("course_id", courseName)
            .eq("module_name", moduleName)
            .maybeSingle();

    if (error || !data)
    {
        document.getElementById("moduleTitle").textContent = "Video not found.";
        console.error(error);
        return;
    }

    quizId = data.quiz_id || "";

    // Show module_name as heading and video_title as subtitle
    document.getElementById("moduleTitle").textContent = data.module_name || moduleName;
    const subtitleEl = document.getElementById("videoSubtitle");
    if (subtitleEl) subtitleEl.textContent = data.video_title || "";
    document.getElementById("videoPlayer").src = data.video_url;
}

// BUG FIX #10: old code had no tracking write at all.
// Write video_completed = true in studentcoursetracking when the video ends.
async function markVideoCompleted()
{
    // Resolve reg_no — cached after login by coursePage, or re-fetch here
    let reg_no = localStorage.getItem("studentRegNo") || "";

    if (!reg_no)
    {
        const loginUser = (localStorage.getItem("user") || "").trim();
        if (loginUser)
        {
            const { data: profile } = await client
                .from("studentprofile")
                .select("reg_no, student_name")
                .eq("mail_id", loginUser)
                .maybeSingle();
            if (profile && profile.reg_no)
            {
                reg_no = profile.reg_no;
                localStorage.setItem("studentRegNo", reg_no);
            }
        }
    }

    if (!reg_no) return;   // can't write without a key

    // Check if a tracking row already exists for this reg_no + course + module
    const { data: existing } = await client
        .from("studentcoursetracking")
        .select("reg_no")
        .eq("reg_no", reg_no)
        .eq("course_name", courseName)
        .eq("module_name", moduleName)
        .maybeSingle();

    if (existing)
    {
        // Row exists — just update video_completed
        await client
            .from("studentcoursetracking")
            .update({ video_completed: true })
            .eq("reg_no", reg_no)
            .eq("course_name", courseName)
            .eq("module_name", moduleName);
    }
    else
    {
        // No row yet — insert a new tracking record
        const loginUser = (localStorage.getItem("user") || "").trim();
        let student_name = "";
        if (loginUser)
        {
            const { data: profile } = await client
                .from("studentprofile")
                .select("student_name")
                .eq("mail_id", loginUser)
                .maybeSingle();
            student_name = profile?.student_name || "";
        }

        await client
            .from("studentcoursetracking")
            .insert([{
                reg_no,
                student_name,
                course_name:  courseName,
                module_name:  moduleName,
                video_completed:  true,
                quiz_completed:   false,
                quiz_attempt:     0,
                quiz_mark_obtained: "",
                module_score:     ""
            }]);
    }
}

document.getElementById("videoPlayer").onended = async function()
{
    // Write tracking first, then unlock quiz button
    await markVideoCompleted();

    const btn = document.getElementById("quizBtn");
    btn.disabled = false;
    btn.classList.add("enabled");

    if (quizId)
    {
        btn.innerHTML = "📝 Start Quiz";

        // BUG FIX #9: old redirect used "&module="+moduleId+"&course="+courseId
        // (both null). Must pass course_name and module_name so quizPage can
        // identify which quiz to load.
        btn.onclick = function()
        {
            location.href =
                "quizPage.html" +
                "?quiz="        + encodeURIComponent(quizId) +
                "&course_name=" + encodeURIComponent(courseName) +
                "&module_name=" + encodeURIComponent(moduleName);
        };
    }
    else
    {
        btn.innerHTML = "✅ No Quiz — Module Complete";
        btn.onclick = function() { history.back(); };
    }
};

loadModule();

</script>

</body>
</html>
