<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Student LMS</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #172554,
        #1d4ed8
    );
    min-height:100vh;
    overflow:hidden;
}

/* MAIN LAYOUT */

.dashboard{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:250px;
    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-right:
        1px solid rgba(255,255,255,0.08);

    padding:20px;

    display:flex;
    flex-direction:column;
}

/* LOGO */

.logo{
    font-size:30px;
    color:white;
    font-weight:700;
    margin-bottom:35px;
}

/* MENU */

.sidebar ul{
    list-style:none;
}

.sidebar li{
    color:white;
    padding:14px 18px;
    margin-bottom:12px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;

    background:
        rgba(255,255,255,0.05);

    font-size:17px;
}

.sidebar li:hover{
    background:
        rgba(255,255,255,0.15);

    transform:
        translateX(5px);
}

.sidebar li.active{
    background:
        linear-gradient(
            135deg,
            #2563eb,
            #3b82f6
        );
}

/* RIGHT PANEL */

.right-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* TOPBAR */

.topbar{
    height:90px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 30px;

    background:
        rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    border-bottom:
        1px solid rgba(255,255,255,0.08);

    flex-shrink:0;
}

.topbar h1{
    color:white;
    font-size:34px;
    font-weight:700;
}

.topbar p{
    color:#cbd5e1;
    margin-top:6px;
    font-size:14px;
}

/* PROFILE */

.profile img{
    width:60px;
    height:60px;
    border-radius:50%;
    border:3px solid white;
}

/* CONTENT */

.main-content{
    flex:1;
    overflow:hidden;
}

/* IFRAME */

#contentFrame{
    width:100%;
    height:100%;
    border:none;
    display:block;
    background:transparent;
}

.profile{
    display:flex;
    align-items:center;
    gap:12px;
}

.user-info{
    color:white;
    font-size:16px;
    font-weight:600;
    background:rgba(255,255,255,0.1);
    padding:10px 16px;
    border-radius:12px;
}

</style>

</head>

<body>

<div class="dashboard">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            NextGen Edu
        </div>

        <ul>
            <li class="active" onclick="loadPage('studentdashboardPage.html',this)">
                Dashboard
            </li>

            <li onclick="loadPage('certificates.html',this)">
                Certificates
            </li>
            <li onclick="logout()">
                Logout
            </li>
        </ul>
    </aside>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <h1>
                    Welcome Back 👋
                </h1>
                <p>
                    Continue your learning journey
                </p>
            </div>
         <div class="profile">
    <div class="user-info">
        <span id="studentName">Loading...</span>
    </div>
</div>
        </div>

        <!-- PAGE CONTENT -->

        <main class="main-content">
            <iframe id="contentFrame" src="studentdashboardPage.html">
            </iframe>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
        const SUPABASE_URL ="https://akodraeqesulsofaanna.supabase.co";
        const SUPABASE_KEY ="sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";

        const client =supabase.createClient(SUPABASE_URL,SUPABASE_KEY );
</script>
<script>
document.addEventListener("DOMContentLoaded", async () =>
{
    try
    {
        const regNo = localStorage.getItem("user");

        console.log("Logged In User:", regNo);

        if (!regNo)
        {
            document.getElementById("studentName").innerText = "Student";
            return;
        }

        const { data, error } = await client
            .from("studentprofile")
            .select("student_name")
            .eq("reg_no", regNo)
            .single();

        console.log("Student Data:", data);
        console.log("Error:", error);

        if (error)
        {
            document.getElementById("studentName").innerText = regNo;
            return;
        }

        document.getElementById("studentName").innerText =data.student_name;
        localStorage.setItem("studentName", data.student_name);
    }
    catch (err)
    {
        console.error(err);
    }
});

function loadPage(page, element)
{
    document.getElementById("contentFrame").src = page;

    document.querySelectorAll(".sidebar li")
        .forEach(item =>
        {
            item.classList.remove("active");
        });

    element.classList.add("active");
}

function logout()
{
    localStorage.removeItem("user");
    localStorage.removeItem("role");

    window.location.href = "login.html";
}

</script>
</body>
</html>
