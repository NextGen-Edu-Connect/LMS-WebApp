<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Student LMS</title>

<link rel="preconnect"
      href="https://fonts.googleapis.com">

<link rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
/* Custom status styling in student wrapper */
.topbar-right-controls {
    display: flex;
    align-items: center;
    gap: 15px;
}
.status-pill {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.status-pill.enrolled {
    background: rgba(16, 185, 129, 0.15);
    color: #10b981;
    border: 1px solid rgba(16, 185, 129, 0.3);
}
.status-pill.pending {
    background: rgba(245, 158, 11, 0.15);
    color: #f59e0b;
    border: 1px solid rgba(245, 158, 11, 0.3);
}
</style>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:
    linear-gradient(
        135deg,
        #020617,
        #0f172a,
        #172554,
        #1d4ed8
    );
    min-height:100vh;
    overflow:hidden;
}

/* MAIN LAYOUT */

.dashboard{
    display:flex;
    height:100vh;
}

/* SIDEBAR */

.sidebar{
    width:250px;
    background:
        rgba(255,255,255,0.08);

    backdrop-filter:blur(18px);

    border-right:
        1px solid rgba(255,255,255,0.08);

    padding:20px;

    display:flex;
    flex-direction:column;
}

/* LOGO */

.logo{
    font-size:30px;
    color:white;
    font-weight:700;
    margin-bottom:35px;
}

/* MENU */

.sidebar ul{
    list-style:none;
}

.sidebar li{
    color:white;
    padding:14px 18px;
    margin-bottom:12px;
    border-radius:14px;
    cursor:pointer;
    transition:0.3s;

    background:
        rgba(255,255,255,0.05);

    font-size:17px;
}

.sidebar li:hover{
    background:
        rgba(255,255,255,0.15);

    transform:
        translateX(5px);
}

.sidebar li.active{
    background:
        linear-gradient(
            135deg,
            #2563eb,
            #3b82f6
        );
}

/* RIGHT PANEL */

.right-panel{
    flex:1;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

/* TOPBAR */

.topbar{
    height:90px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 30px;

    background:
        rgba(255,255,255,0.06);

    backdrop-filter:blur(18px);

    border-bottom:
        1px solid rgba(255,255,255,0.08);

    flex-shrink:0;
}

.topbar h1{
    color:white;
    font-size:34px;
    font-weight:700;
}

.topbar p{
    color:#cbd5e1;
    margin-top:6px;
    font-size:14px;
}

/* PROFILE */

.profile img{
    width:60px;
    height:60px;
    border-radius:50%;
    border:3px solid white;
}

/* CONTENT */

.main-content{
    flex:1;
    overflow:hidden;
}

/* IFRAME */

#contentFrame{
    width:100%;
    height:100%;
    border:none;
    display:block;
    background:transparent;
}

</style>

</head>

<body>

<div class="dashboard">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            NextGen Edu
        </div>

        <ul>
            <li class="active" onclick="loadPage('studentdashboardPage.html',this)">
                Dashboard
            </li>

            <li onclick="loadPage('studentcertificatePage.html',this)">
                Certificates
            </li>
            <li onclick="logout()">
                Logout
            </li>
        </ul>
    </aside>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <!-- TOPBAR -->
        <div class="topbar">
            <div>
                <h1 id="topWelcomeHeader">
                    Welcome Back 👋
                </h1>
                <p>
                    Continue your learning journey
                </p>
            </div>
            <div class="topbar-right-controls">
                <div id="topEnrollmentBadge"></div>
                <div class="profile">
                    <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&auto=format&fit=crop&q=80" style="border: 2px solid rgba(255,255,255,0.2);">
                </div>
            </div>
        </div>

        <!-- PAGE CONTENT -->

        <main class="main-content">
            <iframe id="contentFrame" src="studentdashboardPage.html">
            </iframe>
        </main>
    </div>
</div>
<script>

const SUPABASE_URL = "https://akodraeqesulsofaanna.supabase.co";
const SUPABASE_KEY = "sb_publishable_q6jaRXcDuGa6qXCU4FZrfA_OObM1r2C";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function checkTopEnrollmentStatus() {
    const username = localStorage.getItem("user");
    if (!username) return;

    try {
        const { data, error } = await client
            .from("studentenrollment")
            .select("student_name, enrollment_status")
            .eq("reg_no", username);

        const badge = document.getElementById("topEnrollmentBadge");
        const header = document.getElementById("topWelcomeHeader");

        if (error) throw error;

        if (data && data.length > 0) {
            const student = data[0];
            if (header) header.innerText = `Welcome, ${student.student_name || username} 👋`;
            if (badge) {
                badge.innerHTML = `
                    <span class="status-pill enrolled">
                        <i class="fa-solid fa-circle-check" style="margin-right: 5px;"></i>Enrolled
                    </span>
                `;
            }
        } else {
            // Check local storage registered students metadata for name fallback
            const registered = JSON.parse(localStorage.getItem("registered_students")) || [];
            const matchedReg = registered.find(s => s.reg_no === username);
            const studentName = matchedReg ? matchedReg.student_name : username;

            if (header) header.innerText = `Welcome, ${studentName} 👋`;
            if (badge) {
                badge.innerHTML = `
                    <span class="status-pill pending">
                        <i class="fa-solid fa-clock" style="margin-right: 5px;"></i>Pending Enrollment
                    </span>
                `;
            }
        }
    } catch(err) {
        console.error("Topbar status query failed:", err);
    }
}

// Run status query on load
window.addEventListener("DOMContentLoaded", checkTopEnrollmentStatus);

function loadPage(page, element)
{
    document.getElementById("contentFrame").src = page;
    document.querySelectorAll(".sidebar li")
        .forEach(item =>
        {
            item.classList.remove("active");
        });

    element.classList.add("active");
}

function logout()
{
    window.location.href ="login.html";
}
</script>
</body>
</html>
